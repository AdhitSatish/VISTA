  { id:"BA10", dimension:"BA", subComponent:"SC4.3 Exec thought leadership", subComponentPoints:15, criteriaInSubComponent:4, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Search for the CEO or country manager's name in Google News. Is a named person from the brand quoted in coverage that the brand itself did not produce?", text:"a named company leader has been quoted in an independent article", evidence:"web address of the article with the quote" },
  { id:"BA11", dimension:"BA", subComponent:"SC4.3 Exec thought leadership", subComponentPoints:15, criteriaInSubComponent:4, tag:"M", pattern:"F", inverted:false, sponsorable:false, hint:"Find the longest or most detailed interview with a brand executive you can find. Does the person say something meaningful and substantive, or is it just a brief quote from a product launch? Match to the level below.", text:"a company leader has given a full interview, not just a one-line quote", evidence:"web address of the interview" },
  { id:"BA12", dimension:"BA", subComponent:"SC4.3 Exec thought leadership", subComponentPoints:15, criteriaInSubComponent:4, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Has a brand executive appeared on a podcast, at a panel discussion, or on a conference stage? Search their name to find out.", text:"a company leader has appeared on a podcast, panel, or public stage", evidence:"web address of the podcast, panel, or event appearance" },
  { id:"BA13", dimension:"BA", subComponent:"SC4.3 Exec thought leadership", subComponentPoints:15, criteriaInSubComponent:4, tag:"M", pattern:"C", inverted:false, sponsorable:false, hint:"Does any executive publish their own articles or opinions (for example, on LinkedIn), or get quoted by journalists as an industry expert? Match to the level below.", text:"a company leader is publicly known for their own industry opinions or commentary", evidence:"web address of the published commentary or article" },
  // SC4.4 Independent expert reviews (15pts, 4)
  { id:"BA14", dimension:"BA", subComponent:"SC4.4 Independent expert reviews", subComponentPoints:15, criteriaInSubComponent:4, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Search YouTube and Google for the brand name followed by review, or a product name followed by review. Is there at least one review produced by an independent person who has no connection to the brand?", text:"at least one independent expert has reviewed the product", evidence:"web address of the expert review" },
  { id:"BA15", dimension:"BA", subComponent:"SC4.4 Independent expert reviews", subComponentPoints:15, criteriaInSubComponent:4, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Are there independent expert reviews in both written form (an article or blog post) and video form (YouTube or a similar platform)?", text:"expert reviews exist in more than one format, such as written and video", evidence:"web addresses of each review format found" },
  { id:"BA16", dimension:"BA", subComponent:"SC4.4 Independent expert reviews", subComponentPoints:15, criteriaInSubComponent:4, tag:"M", pattern:"F", inverted:false, sponsorable:false, hint:"Look at who wrote or made the reviews. Are they people who specialize in this product category, or are they general lifestyle accounts who review many unrelated things? Match to the level below.", text:"the reviewers are genuine specialists in this product category", evidence:"notes on the reviewer's background and credentials" },
  { id:"BA17", dimension:"BA", subComponent:"SC4.4 Independent expert reviews", subComponentPoints:15, criteriaInSubComponent:4, tag:"M", pattern:"B", inverted:false, sponsorable:false, hint:"Read or watch the reviews and note the overall verdict in each one. Are the reviewers generally positive about the brand? Match the overall tone to the level below.", text:"the overall verdict from expert reviews is more positive than negative", evidence:"summary of the overall verdict from expert reviews" },
  // SC4.5 Awards (10pts, 3, sponsorable)
  { id:"BA18", dimension:"BA", subComponent:"SC4.5 Awards + recognition", subComponentPoints:10, criteriaInSubComponent:2, tag:"S", pattern:null, inverted:false, sponsorable:true, hint:"Search for the brand name followed by award, and separately by recognition. Has the brand won or been shortlisted for an award given by an independent body, not one the brand organized or paid to enter itself?", text:"the brand has won or been shortlisted for a credible, independent award", evidence:"web address of the award or shortlist announcement" },
  { id:"BA20", dimension:"BA", subComponent:"SC4.5 Awards + recognition", subComponentPoints:10, criteriaInSubComponent:2, tag:"S", pattern:null, inverted:false, sponsorable:true, hint:"Look at the date of that award or recognition. Is it from this year or last year?", text:"any award or recognition the brand holds is recent", evidence:"date of the most recent award or recognition" },
  // SC4.6 Backlinks (10pts, 3)
  { id:"BA21", dimension:"BA", subComponent:"SC4.6 Backlinks from authoritative sources", subComponentPoints:10, criteriaInSubComponent:3, tag:"A", pattern:null, inverted:false, sponsorable:false, hint:"Go to ahrefs.com/backlink-checker, paste the brand's web address, and run the check. Do links from well-known, respected websites appear in the results? (This tool shows which other websites link back to the brand's site.)", text:"credible, well-known websites link to the brand's website", evidence:"screenshot or export from the backlink checker tool" },
  { id:"BA22", dimension:"BA", subComponent:"SC4.6 Backlinks from authoritative sources", subComponentPoints:10, criteriaInSubComponent:3, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Look through the links listed. Are some of them placed inside the text of actual articles, rather than just being directory listings or links sitting in website footers?", text:"links to the brand's site appear within real articles, not just directory listings", evidence:"examples of links found inside real articles" },
  { id:"BA23", dimension:"BA", subComponent:"SC4.6 Backlinks from authoritative sources", subComponentPoints:10, criteriaInSubComponent:3, tag:"A", pattern:null, inverted:false, sponsorable:false, hint:"In the same link checker results, does the list look mostly clean and legitimate, with no flood of unrelated or low-quality websites?", text:"links to the brand's site are from real, trustworthy sources", evidence:"screenshot from the link checker tool" },
  // SC4.7 Corporate authority (10pts, 3)
  { id:"BA24", dimension:"BA", subComponent:"SC4.7 Corporate authority", subComponentPoints:10, criteriaInSubComponent:3, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Is the brand backed by a well-known parent company, and can you find that connection easily on the website, in news coverage, or on the parent company's own site?", text:"the brand belongs to a credible parent company or has clear ownership", evidence:"notes on the parent company and ownership" },
  { id:"BA25", dimension:"BA", subComponent:"SC4.7 Corporate authority", subComponentPoints:10, criteriaInSubComponent:3, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Can you find formal company information published publicly somewhere, such as an annual report, a corporate disclosure page, or the parent company's investor section?", text:"information about the brand's ownership and business structure is publicly visible", evidence:"web address where ownership information is published" },
  { id:"BA26", dimension:"BA", subComponent:"SC4.7 Corporate authority", subComponentPoints:10, criteriaInSubComponent:3, tag:"M", pattern:"B", inverted:true, inlineAnchors:{1:"A major unresolved controversy or legal matter is actively in public circulation",2:"A notable controversy exists and has not been publicly addressed",3:"One minor controversy, mostly settled or fading",4:"No significant controversy; only isolated past complaints",5:"Clean public record: no controversy, scandal, or unresolved dispute found"}, sponsorable:false, hint:"Google the brand name followed by controversy, then scandal, then lawsuit. A completely clean result scores 5. One major unresolved story that dominates the results scores 1.", text:"no major unresolved public controversy appears when researching the brand", evidence:"notes from searching for controversies" },
  // SC4.8 3rd-party category placement (5pts, 2, sponsorable)
  { id:"BA27", dimension:"BA", subComponent:"SC4.8 3rd-party category placement", subComponentPoints:5, criteriaInSubComponent:2, tag:"S", pattern:null, inverted:false, sponsorable:true, hint:"Search for independent best-of or listicle articles for this product category in this country. Does the brand appear in any list that the brand itself did not write or commission?", text:"the brand appears in independent best-of lists or recommendation roundups", evidence:"web address of the best-of list or roundup" },
  { id:"BA28", dimension:"BA", subComponent:"SC4.8 3rd-party category placement", subComponentPoints:5, criteriaInSubComponent:2, tag:"S", pattern:null, inverted:false, sponsorable:true, hint:"Is the brand featured, listed, or reviewed in a publication that the brand's actual customers read and trust?", text:"the brand is featured in a publication relevant to this market", evidence:"web address of the feature in the relevant publication" },

  // ========== SC, Social & Content (28) ==========
  // SC5.1 Platform selection (10pts, 4)
  { id:"SC01", dimension:"SC", subComponent:"SC5.1 Platform selection + setup", subComponentPoints:10, criteriaInSubComponent:4, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"List the social media platforms that matter most for brands in this industry. Open each one and search for the brand. Is the brand present on every platform that matters? Cross-check against the social profiles you found in SV03.", text:"the brand has a profile on every social platform relevant to its industry", evidence:"web addresses of each social profile" },
  { id:"SC02", dimension:"SC", subComponent:"SC5.1 Platform selection + setup", subComponentPoints:10, criteriaInSubComponent:4, tag:"A", pattern:null, inverted:false, sponsorable:false, hint:"Look at the web address for each social media profile. Is it a clean address using the brand's name (like instagram.com/brandx), rather than a long random ID number?", text:"all social profiles use a clean, professional username", evidence:"web addresses of each profile with the username visible" },
  { id:"SC03", dimension:"SC", subComponent:"SC5.1 Platform selection + setup", subComponentPoints:10, criteriaInSubComponent:4, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Open every social media profile. Is each one complete, with a bio written out, a link to the website, a way to get in contact, and a proper profile picture?", text:"all social profiles are fully set up with a bio, link, and profile photo", evidence:"screenshots of each completed profile" },
  { id:"SC04", dimension:"SC", subComponent:"SC5.1 Platform selection + setup", subComponentPoints:10, criteriaInSubComponent:4, tag:"M", pattern:"F", inverted:false, sponsorable:false, hint:"Is the brand completely absent from any social media platform where its customers actually spend their time? Match how critical any such gap is to the level below.", text:"the brand is not missing from any platform that matters for its category", evidence:"notes on any important platforms the brand is missing from" },
  // SC5.2 Cadence (10pts, 3)
  { id:"SC05", dimension:"SC", subComponent:"SC5.2 Cadence + consistency", subComponentPoints:10, criteriaInSubComponent:3, tag:"A", pattern:null, inverted:false, sponsorable:false, hint:"Open the brand's main social media profile and look at the post dates for the last two months. Is there at least one new post every week?", text:"the brand posts on its main platform at least once a week", evidence:"dates of the most recent posts" },
  { id:"SC06", dimension:"SC", subComponent:"SC5.2 Cadence + consistency", subComponentPoints:10, criteriaInSubComponent:3, tag:"A", pattern:null, inverted:false, sponsorable:false, hint:"Look at the post dates going back six months. Is there ever a gap of more than 30 days with no posts? Tick yes only if there is no such gap.", text:"the brand has not gone more than 30 days without posting on its main platform", evidence:"dates showing the longest gap between posts" },
  { id:"SC07", dimension:"SC", subComponent:"SC5.2 Cadence + consistency", subComponentPoints:10, criteriaInSubComponent:3, tag:"M", pattern:"E", inverted:false, sponsorable:false, hint:"Look at how regularly the brand posts over the last several months. Is it a steady, predictable rhythm, or are there bursts of many posts followed by long periods of silence? Match to the level below.", text:"posting is regular and consistent, not bursts followed by long silences", evidence:"a list of post dates showing the posting pattern" },
  // SC5.3 Visual identity + creative (20pts, 5)
  { id:"SC08", dimension:"SC", subComponent:"SC5.3 Visual identity + creative", subComponentPoints:20, criteriaInSubComponent:5, tag:"M", pattern:"E", inverted:false, sponsorable:false, hint:"Open the profile and look at the last 20 posts as a grid. Is the color palette consistent across all of them? Match to the level below.", text:"the last 20 posts use the same colours throughout", evidence:"screenshot of the last 20 posts" },
  { id:"SC09", dimension:"SC", subComponent:"SC5.3 Visual identity + creative", subComponentPoints:20, criteriaInSubComponent:5, tag:"M", pattern:"E", inverted:false, sponsorable:false, hint:"Looking at the same 20 posts, are the fonts and graphic style consistent throughout? Match to the level below.", text:"the last 20 posts use the same text style and graphic layout", evidence:"screenshot of the last 20 posts" },
  { id:"SC10", dimension:"SC", subComponent:"SC5.3 Visual identity + creative", subComponentPoints:20, criteriaInSubComponent:5, tag:"M", pattern:"C", inverted:false, sponsorable:false, hint:"Look at the photos in the feed. Are they original photos taken locally, showing real locations, real staff, and real customers? Or are they stock photos and images supplied by the manufacturer? Match to the level below.", text:"photos on the feed are original to the brand, not stock images from the manufacturer", evidence:"screenshot of the feed noting which images are original" },
  { id:"SC11", dimension:"SC", subComponent:"SC5.3 Visual identity + creative", subComponentPoints:20, criteriaInSubComponent:5, tag:"M", pattern:"E", inverted:false, sponsorable:false, hint:"Look at the 20-post grid as a whole. Does it feel like one unified brand world, or a random mix of unrelated styles? Match to the level below.", text:"the social feed looks like a consistent, recognisable branded world", evidence:"screenshot of the feed showing the overall look" },
  { id:"SC12", dimension:"SC", subComponent:"SC5.3 Visual identity + creative", subComponentPoints:20, criteriaInSubComponent:5, tag:"M", pattern:"F", inverted:false, sponsorable:false, hint:"Look at the overall quality of the posts. Does the visual quality match the price level the brand claims? A premium brand should look premium. Match to the level below.", text:"the quality of creative work matches where the brand sits in the market", evidence:"screenshot of the feed showing the quality level" },
  // SC5.4 Content mix (15pts, 4)
  { id:"SC13", dimension:"SC", subComponent:"SC5.4 Content mix across pillars", subComponentPoints:15, criteriaInSubComponent:4, tag:"M", pattern:"D", inverted:false, sponsorable:false, hint:"Look at the last 20 posts and label each one by type: product, lifestyle, people, education, events, or ownership. How many of those six types appear at least once? Match to the level below.", text:"posts cover at least 4 different topics such as products, lifestyle, people, and education", evidence:"notes tagging each post by topic" },
  { id:"SC14", dimension:"SC", subComponent:"SC5.4 Content mix across pillars", subComponentPoints:15, criteriaInSubComponent:4, tag:"M", pattern:"D", inverted:true, inlineAnchors:{1:"Over 80% of posts are product launches or announcements, no real content variety",2:"Heavy product focus (60-80%); very limited other content types",3:"Product still dominates (40-60%) but some variety exists",4:"Good mix across 3-4 content pillars; product is present but not dominant",5:"Balanced across all pillar types; no single content type exceeds 40%"}, sponsorable:false, hint:"From that same labeling exercise, what share of the 20 posts are product announcements or launch posts? A healthy, varied mix across different post types scores 5. A feed that is more than 80% product announcements, with almost no other content, scores 1.", text:"posts are not dominated by product announcements and promotions", evidence:"notes tagging each post by topic" },
  { id:"SC15", dimension:"SC", subComponent:"SC5.4 Content mix across pillars", subComponentPoints:15, criteriaInSubComponent:4, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Point to actual posts in the feed that show lifestyle or world-building content, not just product shots. Do they exist?", text:"posts that build a lifestyle or world around the brand are present", evidence:"examples of lifestyle posts" },
  { id:"SC16", dimension:"SC", subComponent:"SC5.4 Content mix across pillars", subComponentPoints:15, criteriaInSubComponent:4, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Point to actual posts that teach owners something or give useful tips, such as how-to guides, care tips, or owner advice. Do they exist?", text:"posts that educate customers or show what owning the product is like are present", evidence:"examples of educational or ownership posts" },
  // SC5.5 Storytelling (15pts, 3)
  { id:"SC17", dimension:"SC", subComponent:"SC5.5 Storytelling + voice", subComponentPoints:15, criteriaInSubComponent:3, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Does the brand publish longer-form content anywhere, such as blog articles, long YouTube videos, or a newsletter?", text:"the brand publishes original long-form or in-depth content somewhere", evidence:"web address of the long-form content" },
  { id:"SC18", dimension:"SC", subComponent:"SC5.5 Storytelling + voice", subComponentPoints:15, criteriaInSubComponent:3, tag:"M", pattern:"E", inverted:false, sponsorable:false, hint:"Read ten captions in a row. Does the brand have a recognizable, distinctive writing style, or do the captions feel like they could have been written by any company? Match to the level below.", text:"the brand has a recognisable writing or communication style", evidence:"examples of posts showing the communication style" },
  { id:"SC19", dimension:"SC", subComponent:"SC5.5 Storytelling + voice", subComponentPoints:15, criteriaInSubComponent:3, tag:"M", pattern:"C", inverted:false, sponsorable:false, hint:"Does the content feel like it tells the local brand's own story, or does it mostly just repost material produced by the global manufacturer? Match to the level below.", text:"content tells the brand's own story, not just the global manufacturer's story", evidence:"examples of posts that tell the brand's own story" },
  // SC5.6 Video strategy (10pts, 3)
  { id:"SC20", dimension:"SC", subComponent:"SC5.6 Video strategy", subComponentPoints:10, criteriaInSubComponent:3, tag:"A", pattern:null, inverted:false, sponsorable:false, hint:"Scroll the brand's main social media feed. Is there video content (Reels, uploaded video clips), not just still images?", text:"the brand posts original videos on its main platform", evidence:"web address or screenshot of a video post" },
  { id:"SC21", dimension:"SC", subComponent:"SC5.6 Video strategy", subComponentPoints:10, criteriaInSubComponent:3, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Is the video published in the right format for each platform, for example, vertical Reels for Instagram, Shorts for YouTube, and longer videos for YouTube's main feed?", text:"video formats are suited to the platform they are posted on", evidence:"screenshots of the different video formats used" },
  { id:"SC22", dimension:"SC", subComponent:"SC5.6 Video strategy", subComponentPoints:10, criteriaInSubComponent:3, tag:"M", pattern:"F", inverted:false, sponsorable:false, hint:"Watch two or three of the brand's videos. Does the production quality match the brand's positioning? Match to the level below.", text:"video production quality matches the brand's level and audience", evidence:"screenshot or link to a video showing production quality" },
  // SC5.7 Engagement quality (10pts, 3)
  { id:"SC23", dimension:"SC", subComponent:"SC5.7 Engagement quality", subComponentPoints:10, criteriaInSubComponent:3, tag:"A", pattern:null, inverted:false, sponsorable:false, hint:"Enter the likes, comments, shares, and views for the last 10 posts in the Social Content inputs section above. The calculator will work out what percentage of the audience interacted with the content. Is that percentage 1.0% or higher?", text:"the brand's posts get at least 1 percent engagement on average", evidence:"engagement rate calculation for the last 10 posts" },
  { id:"SC24", dimension:"SC", subComponent:"SC5.7 Engagement quality", subComponentPoints:10, criteriaInSubComponent:3, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Open the comments on a few recent posts. Does the brand visibly reply to questions and comments from people?", text:"the brand actively responds to comments and messages", evidence:"screenshots of the brand replying to comments" },
  { id:"SC25", dimension:"SC", subComponent:"SC5.7 Engagement quality", subComponentPoints:10, criteriaInSubComponent:3, tag:"M", pattern:"B", inverted:false, sponsorable:false, hint:"Compare the follower count to the number of likes and comments on a typical post. Does the interaction feel genuine and proportionate, or does the brand have a large following but almost no actual engagement? Match to the level below.", text:"audience engagement looks genuine, not inflated by paid or fake methods", evidence:"engagement rate calculation with notes on whether it looks genuine" },
  // SC5.8 Cross-platform (10pts, 3)
  { id:"SC26", dimension:"SC", subComponent:"SC5.8 Cross-platform integration", subComponentPoints:10, criteriaInSubComponent:3, tag:"M", pattern:"E", inverted:false, sponsorable:false, hint:"Open all the brand's social media profiles side by side. Does the brand feel like the same brand across all of them? Match how consistent the look and feel is to the level below.", text:"the brand's identity looks consistent across all its social platforms", evidence:"screenshots from each platform side by side" },
  { id:"SC27", dimension:"SC", subComponent:"SC5.8 Cross-platform integration", subComponentPoints:10, criteriaInSubComponent:3, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Check the follower counts for Facebook and Instagram and enter them in the inputs section above. If the brand launched after 2015 or is aimed at a younger audience, does Facebook have more than 10 times as many followers as Instagram? If it does, that is a sign the brand is not where its most likely buyers spend their time.", text:"the brand's followers are on the platforms where its buyers actually spend time", evidence:"follower counts from each platform" },
  { id:"SC28", dimension:"SC", subComponent:"SC5.8 Cross-platform integration", subComponentPoints:10, criteriaInSubComponent:3, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Do the social media profiles link to each other, or does the brand run campaigns that connect them together?", text:"the brand's social platforms reference and support each other", evidence:"notes on how the platforms link to and reference each other" },

  // ========== RC, Reputation & Community (27) ==========
  // SC6.1 Review presence (15pts, 5)
  { id:"RC01", dimension:"RC", subComponent:"SC6.1 Review presence + score", subComponentPoints:15, criteriaInSubComponent:5, tag:"A", pattern:null, inverted:false, sponsorable:false, hint:"Open the brand's Google Business Profile (find it by Googling the brand name). Are there any customer reviews showing on it at all?", text:"the brand has customer reviews on its Google listing", evidence:"screenshot of the Google Maps listing showing reviews" },
  { id:"RC02", dimension:"RC", subComponent:"SC6.1 Review presence + score", subComponentPoints:15, criteriaInSubComponent:5, tag:"A", pattern:null, inverted:false, sponsorable:false, hint:"Count all reviews across Google, Facebook, and any other relevant platforms. Are there 20 or more in total?", text:"the brand has at least 20 reviews across all platforms", evidence:"screenshots of the review counts on each platform" },
  { id:"RC03", dimension:"RC", subComponent:"SC6.1 Review presence + score", subComponentPoints:15, criteriaInSubComponent:5, tag:"A", pattern:null, inverted:false, sponsorable:false, hint:"Is the average star rating 4.0 or higher across those platforms?", text:"the average rating across platforms is 4.0 or above", evidence:"screenshots of the ratings on each platform" },
  { id:"RC04", dimension:"RC", subComponent:"SC6.1 Review presence + score", subComponentPoints:15, criteriaInSubComponent:5, tag:"A", pattern:null, inverted:false, sponsorable:false, hint:"Sort the reviews by newest first. Is there at least one review from the last 90 days?", text:"reviews have been posted within the last 90 days", evidence:"dates of the most recent reviews on each platform" },
  { id:"RC05", dimension:"RC", subComponent:"SC6.1 Review presence + score", subComponentPoints:15, criteriaInSubComponent:5, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Read through the brand's replies under reviews. Does the brand reply to both positive reviews and negative ones?", text:"the brand replies to both positive and negative reviews", evidence:"screenshots of the brand's replies to reviews" },
  // SC6.2 Sentiment (20pts, 4)
  { id:"RC06", dimension:"RC", subComponent:"SC6.2 Sentiment of public discourse", subComponentPoints:20, criteriaInSubComponent:4, tag:"M", pattern:"B", inverted:false, sponsorable:false, hint:"Find 20 public mentions of the brand from online forums, Facebook groups, or comment threads (not posts from the brand itself). Label each one positive, neutral, or negative. Are more of them positive than negative overall? Match to the level below.", text:"the overall tone of public conversations about the brand is more positive than negative", evidence:"labelled list of 20 mentions, each marked positive, neutral, or negative" },
  { id:"RC07", dimension:"RC", subComponent:"SC6.2 Sentiment of public discourse", subComponentPoints:20, criteriaInSubComponent:4, tag:"M", pattern:"B", inverted:true, inlineAnchors:{1:"One specific complaint (e.g. resale, reliability, service) dominates the sample with no brand response visible",2:"A recurring objection is present and largely unanswered",3:"A repeated objection exists but with some brand acknowledgment",4:"No dominant objection; only minor scattered themes",5:"No single complaint dominates; discourse is varied and no objection goes unanswered"}, sponsorable:false, hint:"In your 20-item sample, does one specific complaint, such as service quality, resale value, or reliability, keep coming up again and again with no visible response from the brand? A mix of different complaints, or none at all, scores 5. One complaint that keeps repeating with no response from the brand scores 1.", text:"no single complaint or criticism dominates all public discussion", evidence:"labelled list of the complaints with a note on how often each appears" },
  { id:"RC08", dimension:"RC", subComponent:"SC6.2 Sentiment of public discourse", subComponentPoints:20, criteriaInSubComponent:4, tag:"M", pattern:"bespoke-RC8", inverted:false, sponsorable:false, hint:"Is there genuine, enthusiastic discussion about the brand happening on its own, or is it mostly silence online? Match to the level below.", text:"positive sentiment is driven by genuine customers, not just an absence of criticism", evidence:"notes on whether positive comments are from real customers" },
  { id:"RC09", dimension:"RC", subComponent:"SC6.2 Sentiment of public discourse", subComponentPoints:20, criteriaInSubComponent:4, tag:"M", pattern:"B", inverted:false, sponsorable:false, hint:"Look at the negative items in your sample. Are they all individual one-off complaints from different people, or do they point to the same underlying problem repeating? Match to the level below.", text:"negative comments are isolated incidents, not a repeated pattern", evidence:"notes on whether negative comments are isolated or repeated" },
  // SC6.3 Owner testimonials (15pts, 4)
  { id:"RC10", dimension:"RC", subComponent:"SC6.3 Owner testimonials + stories", subComponentPoints:15, criteriaInSubComponent:4, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Search for real customer testimonials about this brand: posts, videos, or quotes from actual buyers. Do any exist somewhere public?", text:"real customer testimonials exist in public places", evidence:"web addresses where testimonials appear" },
  { id:"RC11", dimension:"RC", subComponent:"SC6.3 Owner testimonials + stories", subComponentPoints:15, criteriaInSubComponent:4, tag:"M", pattern:"A", inverted:false, sponsorable:false, hint:"Count how many distinct stories from different individual customers you can find. Match the count to the level below.", text:"multiple different customer stories or testimonials can be found", evidence:"web addresses of each distinct customer story found" },
  { id:"RC12", dimension:"RC", subComponent:"SC6.3 Owner testimonials + stories", subComponentPoints:15, criteriaInSubComponent:4, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Where do those customer stories live? Only on the brand's own website and social channels, or also on the customers' own social media accounts and independent forums?", text:"testimonials appear in independent places, not only on the brand's own site", evidence:"notes on where each testimonial was found" },
  { id:"RC13", dimension:"RC", subComponent:"SC6.3 Owner testimonials + stories", subComponentPoints:15, criteriaInSubComponent:4, tag:"M", pattern:"F", inverted:false, sponsorable:false, hint:"Read the testimonials. Do they include specific details (which product was bought, how it is used, what surprised the customer), or are they just vague generic praise like great product? Match to the level below.", text:"testimonials are specific and believable, not vague or generic", evidence:"examples of specific, believable testimonials" },
  // SC6.4 Category community (15pts, 4)
  { id:"RC14", dimension:"RC", subComponent:"SC6.4 Category community presence", subComponentPoints:15, criteriaInSubComponent:4, tag:"M", pattern:"A", inverted:false, sponsorable:false, hint:"Search the main online forum or community group for this product category and look for discussions about the brand. How often does the brand come up? Zero mentions scores 1. Regular, active threads score 5.", text:"the brand is talked about in a main online community for this product category", evidence:"screenshot or notes from the community search" },
  { id:"RC15", dimension:"RC", subComponent:"SC6.4 Category community presence", subComponentPoints:15, criteriaInSubComponent:4, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Open the most relevant category groups and online forums for this product type. Is the brand being talked about inside them?", text:"the brand comes up in relevant Facebook groups or online forums", evidence:"screenshots of the brand appearing in groups or forums" },
  { id:"RC16", dimension:"RC", subComponent:"SC6.4 Category community presence", subComponentPoints:15, criteriaInSubComponent:4, tag:"M", pattern:"C", inverted:false, sponsorable:false, hint:"Read the threads about the brand in those communities. Did real members bring up the brand naturally, or does it feel like the brand's own people planted or spammed those posts? Match to the level below.", text:"community discussions about the brand feel organic, not posted by the brand itself", evidence:"notes on whether the discussions look organic" },
  { id:"RC17", dimension:"RC", subComponent:"SC6.4 Category community presence", subComponentPoints:15, criteriaInSubComponent:4, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"In places where brand representatives appear in community discussions, are they being helpful (answering real questions honestly) rather than just promoting the brand?", text:"the brand or its team engage helpfully in community spaces", evidence:"screenshots of the brand or team engaging in communities" },
  // SC6.5 UGC (10pts, 3)
  { id:"RC18", dimension:"RC", subComponent:"SC6.5 UGC volume", subComponentPoints:10, criteriaInSubComponent:3, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Search for the brand's name and any associated tags on social media. Are customers posting about the brand themselves, without being asked?", text:"customers post their own photos or content about the brand without being asked", evidence:"web addresses of customer-created content" },
  { id:"RC19", dimension:"RC", subComponent:"SC6.5 UGC volume", subComponentPoints:10, criteriaInSubComponent:3, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Is that kind of unprompted customer content visible on at least two different platforms?", text:"customer-created content appears on more than one platform", evidence:"web addresses of customer-created content on each platform" },
  { id:"RC20", dimension:"RC", subComponent:"SC6.5 UGC volume", subComponentPoints:10, criteriaInSubComponent:3, tag:"M", pattern:"A", inverted:false, sponsorable:false, hint:"Count how much unprompted customer content you can find. Is the volume meaningful for a brand at this stage? Match to the level below.", text:"the amount of customer-created content is meaningful for a brand at this stage", evidence:"notes on the volume of customer-created content found" },
  // SC6.6 Ambassadors (10pts, 3)
  { id:"RC21", dimension:"RC", subComponent:"SC6.6 Ambassador + advocate infra", subComponentPoints:10, criteriaInSubComponent:3, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Are there named ambassadors or repeat advocates who are publicly associated with the brand and easy to find?", text:"named repeat supporters or ambassadors for the brand are visible", evidence:"web addresses or screenshots of named ambassadors or advocates" },
  { id:"RC22", dimension:"RC", subComponent:"SC6.6 Ambassador + advocate infra", subComponentPoints:10, criteriaInSubComponent:3, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Are there creator or influencer partnerships that are publicly visible, such as tagged collaborations or a sponsored content series?", text:"the brand works with creators or influencers in this space", evidence:"web addresses of creator or influencer partnerships" },
  { id:"RC23", dimension:"RC", subComponent:"SC6.6 Ambassador + advocate infra", subComponentPoints:10, criteriaInSubComponent:3, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Does the brand reshare or feature its advocates' content, such as reposting customer photos, running owner spotlights, or highlighting community members?", text:"the brand actively shares and highlights content created by its customers", evidence:"screenshots of the brand resharing customer content" },
  // SC6.7 Objection handling (10pts, 2)
  { id:"RC24", dimension:"RC", subComponent:"SC6.7 Objection handling in public", subComponentPoints:10, criteriaInSubComponent:2, tag:"M", pattern:"D", inverted:false, sponsorable:false, hint:"Take the most repeated concern from your public mentions research. Is that concern addressed anywhere publicly by the brand? Match to the level below.", text:"the most common complaint about the brand is visibly addressed somewhere", evidence:"notes on where the main complaint is addressed on the brand's site" },
  { id:"RC25", dimension:"RC", subComponent:"SC6.7 Objection handling in public", subComponentPoints:10, criteriaInSubComponent:2, tag:"M", pattern:"B", inverted:false, sponsorable:false, hint:"Find criticism or complaints aimed at the brand on public platforms. Does the brand engage with it, or does it appear to ignore it or delete it? Match to the level below.", text:"the brand engages with criticism rather than ignoring or deleting it", evidence:"notes on how the brand responded to criticism" },

/* ============================================================
   ASSERTIONS, halt on mismatch (no silent wrong answers)
   ============================================================ */
const EXPECTED_COUNTS = { SV: 49, AV: 27, DE: 38, BA: 26, SC: 28, RC: 27 };
const EXPECTED_TOTAL = 195;
const BUILD_ID = "f53fb6c922119870fc09944e822a300a5d6eacbeed067a0ec448427ed6b3e950";

function runAssertions() {
  const counts = {};
  for (const c of CRITERIA) counts[c.dimension] = (counts[c.dimension] || 0) + 1;
  const errors = [];
  for (const [dim, n] of Object.entries(EXPECTED_COUNTS)) {
    if (counts[dim] !== n) errors.push(`${dim} count mismatch: got ${counts[dim]}, expected ${n}`);
  }
  if (CRITERIA.length !== EXPECTED_TOTAL) errors.push(`total mismatch: ${CRITERIA.length} vs ${EXPECTED_TOTAL}`);

  // Per-dimension sub-component point sums must reconcile to 100
  const subSums = {};
  const seenSubComps = {};
  for (const c of CRITERIA) {
    const key = c.dimension + "||" + c.subComponent;
    if (!seenSubComps[key]) {
      seenSubComps[key] = true;
      subSums[c.dimension] = (subSums[c.dimension] || 0) + c.subComponentPoints;
    }
  }
  for (const [dim, tot] of Object.entries(subSums)) {
    if (tot !== 100) errors.push(`${dim} sub-comp point total = ${tot}, expected 100`);
  }

  // BA06/BA07/BA08 must carry criteriaInSubComponent=3 (SC4.2 post-BA09 deletion)
  for (const id of ["BA06","BA07","BA08"]) {
    const c = CRITERIA.find(x => x.id === id);
    if (!c || c.criteriaInSubComponent !== 3) {
      errors.push(`${id} criteriaInSubComponent must be 3 (SC4.2 has 3 criteria after BA09 deletion)`);
    }
  }

  // Every criterion's criteriaInSubComponent must equal the actual count in that sub-component
  const subCompCounts = {};
  for (const c of CRITERIA) {
    subCompCounts[c.subComponent] = (subCompCounts[c.subComponent] || 0) + 1;
  }
  for (const c of CRITERIA) {
    if (subCompCounts[c.subComponent] !== c.criteriaInSubComponent) {
      errors.push(`${c.id} declares ${c.criteriaInSubComponent} in "${c.subComponent}" but that sub-comp has ${subCompCounts[c.subComponent]}`);
    }
  }

  // Renormalization must reconcile: under EVERY flag combination, the
  // renormalized points of each applicable dimension sum to exactly 100.
  const flagNames = Object.keys(APPLICABILITY_FLAGS);
  for (let mask = 0; mask < (1 << flagNames.length); mask++) {
    const flags = {};
    flagNames.forEach((f, i) => flags[f] = !!(mask & (1 << i)));
    const model = buildPointsModel(flags);
    for (const d of ["SV","AV","DE","BA","SC","RC"]) {
      if (!model.dimApplicable[d]) continue;
      let tot = 0;
      for (const c of CRITERIA) if (c.dimension === d) tot += model.ptsOf[c.id];
      if (Math.abs(tot - 100) > 1e-9) {
        errors.push(`renormalization: ${d} totals ${tot.toFixed(6)} under flags mask ${mask}, expected 100`);
      }
    }
  }
  return errors;
}

/* ============================================================
   APPLICABILITY LAYER (published rules, see 01_Framework/applicability-rules.md)
   A criterion whose required flag is OFF is N/A: no input, excluded from
   scoring and counters. Points renormalize so every applicable dimension
   still totals 100 under any flag combination.
   ============================================================ */
const APPLICABILITY_FLAGS = {
  PHYSICAL_LOCATION:  "The brand has a physical location customers can visit (store, branch, office, or venue).",
  PHYSICAL_PRODUCT:   "The brand sells tangible products with specific models (e.g. consumer electronics, appliances, vehicles). Not for pure services, software, or financial products.",
  EV_PHEV:            "The brand has a sub-range or product variant with its own dedicated buyer questions and content (e.g. a premium tier, a specialist line, or a technology-specific category).",
  BOOKABLE_EXPERIENCE:"The brand offers a bookable appointment, trial, or demonstration (e.g. product demo, consultation, site visit, or test experience)."
};
const FLAG_DISPLAY = {
  PHYSICAL_LOCATION:  "Physical Location",
  PHYSICAL_PRODUCT:   "Physical Products",
  EV_PHEV:            "Specialised Product Variant",
  BOOKABLE_EXPERIENCE:"Bookable Experience"
};
const CRIT_FLAGS = {
  SV31:"PHYSICAL_LOCATION", SV32:"PHYSICAL_LOCATION", SV33:"PHYSICAL_LOCATION",
  SV34:"PHYSICAL_LOCATION", SV35:"PHYSICAL_LOCATION", SV36:"PHYSICAL_LOCATION",
  SV37:"PHYSICAL_LOCATION", SV38:"PHYSICAL_LOCATION", SV39:"PHYSICAL_LOCATION",
  DE09:"PHYSICAL_LOCATION", DE36:"PHYSICAL_LOCATION", RC01:"PHYSICAL_LOCATION", RC04:"PHYSICAL_LOCATION",
  SV05:"PHYSICAL_PRODUCT", SV24:"PHYSICAL_PRODUCT", SV43:"PHYSICAL_PRODUCT", SV50:"PHYSICAL_PRODUCT",
  DE02:"PHYSICAL_PRODUCT", DE04:"PHYSICAL_PRODUCT", DE21:"PHYSICAL_PRODUCT", DE22:"PHYSICAL_PRODUCT",
  AV13:"PHYSICAL_PRODUCT", AV14:"PHYSICAL_PRODUCT",
  AV16:"EV_PHEV", DE39:"EV_PHEV",
  DE08:"BOOKABLE_EXPERIENCE"
};

function isApplicable(c, flags) {
  const f = CRIT_FLAGS[c.id];
  return !f || !!flags[f];
}

// Renormalized point value per criterion under the active flags.
// Within a sub-component: its points split across APPLICABLE criteria only.
// A sub-component with zero applicable criteria is dead: its points
// redistribute proportionally across the live sub-components of the dimension.
function buildPointsModel(flags) {
  const subAppl = {};   // subComponent -> applicable criterion count
  const subPts = {};    // subComponent -> declared points
  const subDim = {};    // subComponent -> dimension
  for (const c of CRITERIA) {
    subPts[c.subComponent] = c.subComponentPoints;
    subDim[c.subComponent] = c.dimension;
    subAppl[c.subComponent] = (subAppl[c.subComponent] || 0) + (isApplicable(c, flags) ? 1 : 0);
  }
  const liveTotal = {};  // dimension -> sum of live sub-component points
  for (const sc of Object.keys(subPts)) {
    if (subAppl[sc] > 0) liveTotal[subDim[sc]] = (liveTotal[subDim[sc]] || 0) + subPts[sc];
  }
  const ptsOf = {};      // criterion id -> renormalized point value (0 if N/A)
  for (const c of CRITERIA) {
    if (!isApplicable(c, flags) || subAppl[c.subComponent] === 0) { ptsOf[c.id] = 0; continue; }
    const scale = 100 / liveTotal[c.dimension];  // proportional redistribution of dead sub-components
    ptsOf[c.id] = (c.subComponentPoints * scale) / subAppl[c.subComponent];
  }
  const dimApplicable = {};
  for (const d of ["SV","AV","DE","BA","SC","RC"]) {
    dimApplicable[d] = CRITERIA.some(c => c.dimension === d && isApplicable(c, flags));
  }
  return { ptsOf, dimApplicable };
}

/* ============================================================
   SCORING (pure functions)
   ============================================================ */
function critPts(c) {
  return buildPointsModel(state.flags).ptsOf[c.id];
}

function critValue(c, state, model) {
  const pts = (model || buildPointsModel(state.flags)).ptsOf[c.id];
  if (pts === 0) return 0;  // N/A or dead sub-component
  const v = state.answers[c.id];
  if (c.tag === "M") {
    if (v == null) return 0;
    const s = Number(v);
    if (!(s >= 1 && s <= 5)) return 0;
    return ((s - 1) / 4) * pts;
  }
  // Checklist criteria: any item ticked = full points, empty = 0
  if (c.checklist) {
    return Array.isArray(v) && v.length > 0 ? pts : 0;
  }
  // A/S binary, with tri-state override for BA sponsorables
  if (c.sponsorable) {
    if (v === "earned") return pts;
    if (v === "sponsored") return 0.5 * pts;
    return 0;
  }
  return (v === true || v === "yes") ? pts : 0;
}

function dimensionScore(dim, state) {
  const model = buildPointsModel(state.flags);
  if (!model.dimApplicable[dim]) return null;  // dimension entirely N/A
  let sum = 0;
  for (const c of CRITERIA) if (c.dimension === dim) sum += critValue(c, state, model);
  if (sum > 100) sum = 100;
  return sum;
}

function composite(state) {
  const dims = ["SV","AV","DE","BA","SC","RC"];
  const scores = dims.map(d => dimensionScore(d, state)).filter(s => s !== null);
  if (!scores.length) return 0;
  return scores.reduce((a,b) => a+b, 0) / scores.length;
}

function maturityBand(score) {
  if (score <= 20) return { label: "Invisible", cls: "band-invisible" };
  if (score <= 40) return { label: "Emerging", cls: "band-emerging" };
  if (score <= 60) return { label: "Developing", cls: "band-developing" };
  if (score <= 80) return { label: "Established", cls: "band-established" };
  return { label: "Leading", cls: "band-leading" };
}

/* ============================================================
   ENGAGEMENT, per-post-then-average path (locked)
   Same source of truth for the ER value and the ≥50 gate.
   ============================================================ */
function computeERAndFloor(posts, followers) {
  // posts: array of {shares, saves, comments, likes}; followers: number
  if (!posts || !posts.length || !followers || followers <= 0) {
    return { er: null, avgWeighted: null };
  }
  let sumWeighted = 0;
  let sumER = 0;
  let n = 0;
  for (const p of posts) {
    const w = (Number(p.shares)||0)*5 + (Number(p.saves)||0)*3 +
              (Number(p.comments)||0)*2 + (Number(p.likes)||0)*1;
    sumWeighted += w;
    sumER += (w / followers) * 100;
    n++;
  }
  return { er: sumER / n, avgWeighted: sumWeighted / n };
}

/* ============================================================
   RED FLAGS, read from state, render as chips
   ============================================================ */
function computeFlags(state) {
  const flags = [];

  // 1. Bought/dead audience, provisional
  const primary = state.social?.primary;
  if (primary && primary.posts && primary.posts.length && primary.followers > 0) {
    const { er, avgWeighted } = computeERAndFloor(primary.posts, primary.followers);
    if (er != null && er < 0.5 && avgWeighted >= 50) {
      flags.push({
        id: "bought-dead",
        text: "Suspicious audience: very low engagement despite active posting suggests the followers may not be real or actively engaged.",
        provisional: true
      });
    }
  }

  // 2. Invisible to AI, AV11..AV18 all unchecked/false
  const aeoIds = ["AV11","AV12","AV13","AV14","AV15","AV16","AV17","AV18"];
  const anyAeo = aeoIds.some(id => state.answers[id] === true || state.answers[id] === "yes");
  if (!anyAeo) flags.push({ id:"invisible-ai", text:"Not found by AI: the brand's website doesn't answer any of the key questions that AI search engines look for.", provisional:false });

  // 3. Structural SEO ceiling, SV40 unchecked
  if (state.answers["SV40"] === false || state.answers["SV40"] === "no") {
    flags.push({ id:"seo-ceiling", text:"Website visibility limited: the brand shares a domain with a parent company, which restricts how Google can rank it independently.", provisional:false });
  }

  // 4. Wrong-era audience, FB/IG ratio >= 10 AND launch year >= 2020
  const fb = Number(state.social?.fbFollowers) || 0;
  const ig = Number(state.social?.igFollowers) || 0;
  const launchYear = Number(state.meta?.launchYear) || 0;
  if (ig > 0 && launchYear >= 2020 && (fb / ig) >= 10) {
    flags.push({ id:"wrong-era", text:"Platform mismatch: a brand launched after 2020 has far more Facebook followers than Instagram, which is the wrong audience mix for today's buyers.", provisional:false });
  }

  // 5. Absent where buyers decide, RC14 score = 1
  if (Number(state.answers["RC14"]) === 1) {
    flags.push({ id:"absent-community", text:"Absent from buyer discussions: the brand doesn't appear in the main community where people in this category make purchasing decisions.", provisional:false });
  }

  return flags;
}

// A criterion counts as answered when it holds a real value: binary true/false
// (explicitly evaluated, not untouched), tri-state any of the three, M 1-5,
// checklist at least one item ticked (empty array scores 0, same as untouched,
// so it does NOT count). N/A criteria are excluded from both sides of the count.
function isAnswered(c) {
  const v = state.answers[c.id];
  if (c.checklist) return Array.isArray(v) && v.length > 0;
  if (c.tag === "M") { const s = Number(v); return s >= 1 && s <= 5; }
  if (c.sponsorable) return v === "absent" || v === "sponsored" || v === "earned";
  return v === true || v === false || v === "yes" || v === "no" || v === "na";
}

function progressFor(dim) {
  let answered = 0, applicable = 0;
  for (const c of CRITERIA) {
    if (dim && c.dimension !== dim) continue;
    if (!isApplicable(c, state.flags)) continue;
    applicable++;
    if (isAnswered(c)) answered++;
  }
  return { answered, applicable };
}

function anchorFor(c, lvl) {
  if (c.inlineAnchors && c.inlineAnchors[lvl]) return c.inlineAnchors[lvl];
  const p = PATTERNS[c.pattern];

  el.className = "criterion-card" + (na ? " na" : (isAnswered ? " answered" : ""));

  const header = document.createElement("div"); header.className = "crit-header";

  const idBadge = document.createElement("div"); idBadge.className = "crit-id-badge";
  const tagLabel = c.tag === "M"
    ? `[M-${c.pattern}${c.inverted?"-inv":""}]`
    : `[${c.tag}]`;
  idBadge.innerHTML = `<div class="crit-id-num">${c.id}</div><div class="crit-tag-pill">${tagLabel}</div>`;
  if (na) idBadge.innerHTML += `<span class="na-badge">N/A</span>`;

  const textEl = document.createElement("div"); textEl.className = "crit-text";
  textEl.textContent = c.text;

  header.appendChild(idBadge);
  header.appendChild(textEl);
  el.appendChild(header);

  if (na) {
    const naHint = document.createElement("div");
    naHint.style.cssText = "font-size:12px;color:var(--fg-muted);padding:0 0 4px 54px;";
    naHint.textContent = "Not applicable for this brand type. Automatically skipped.";
    el.appendChild(naHint);
    return el;
  }

  const body = document.createElement("div");
  body.style.paddingLeft = "54px";

  if (c.hint) {
    const hintToggle = document.createElement("button"); hintToggle.className = "hint-toggle";
    hintToggle.innerHTML = `<span class="ht-chevron">&#9654;</span> How to score this`;
    const hintBody = document.createElement("div"); hintBody.className = "hint-body";
    hintBody.textContent = c.hint;
    hintToggle.onclick = () => {
      const open = hintBody.classList.toggle("open");
      hintToggle.classList.toggle("open", open);
    };
    body.appendChild(hintToggle);
    body.appendChild(hintBody);
  }

  if (c.evidence) {
    const ev = document.createElement("div"); ev.className = "crit-ev";
    ev.textContent = "Record: " + c.evidence;
    body.appendChild(ev);
  }

  body.appendChild(renderInput(c));

  // Evidence note
  const noteWrap = document.createElement("div"); noteWrap.className = "crit-note-wrap";
  const hasNote = !!(state.notes[c.id]);
  const noteBtn = document.createElement("button"); noteBtn.className = "crit-note-btn";
  noteBtn.textContent = hasNote ? "evidence note ▲" : "+ evidence note";
  const noteArea = document.createElement("div"); noteArea.className = "crit-note-area";
  noteArea.style.display = hasNote ? "block" : "none";
  const ta = document.createElement("textarea"); ta.className = "crit-note-ta";
  ta.placeholder = "Paste a URL, screenshot reference, or brief observation...";
  ta.value = state.notes[c.id] || "";
  ta.rows = 2;
  ta.oninput = e => { state.notes[c.id] = e.target.value; };
  noteBtn.onclick = () => {
    const open = noteArea.style.display !== "none";
    noteArea.style.display = open ? "none" : "block";
    noteBtn.textContent = open ? (state.notes[c.id] ? "evidence note ▲" : "+ evidence note") : "evidence note ▲";
    if (!open) ta.focus();
  };
  noteArea.appendChild(ta);
  noteWrap.appendChild(noteBtn);
  noteWrap.appendChild(noteArea);
  body.appendChild(noteWrap);

  el.appendChild(body);
  return el;
}

function answer(id, val) {
  state.answers[id] = val;
  pendingNextScroll = true;
  renderAll();
}

/* ============================================================
   RENDER -- inputs
   ============================================================ */
function renderInput(c) {
  const box = document.createElement("div");
  box.style.marginBottom = "4px";

  if (c.checklist) {
    const wrap = document.createElement("div"); wrap.className = "checklist-wrap";
    const cur = Array.isArray(state.answers[c.id]) ? state.answers[c.id] : [];
    for (const item of c.checklist) {
      const lab = document.createElement("label");
      const isChecked = cur.includes(item);
      lab.className = "check-pill" + (isChecked ? " checked" : "");
      const inp = document.createElement("input"); inp.type = "checkbox"; inp.checked = isChecked;
      const icon = document.createElement("span"); icon.className = "chk-icon";
      icon.textContent = isChecked ? "✓" : "";
      inp.onchange = () => {
        const now = Array.isArray(state.answers[c.id]) ? [...state.answers[c.id]] : [];
        if (inp.checked) { if (!now.includes(item)) now.push(item); }
        else { const i = now.indexOf(item); if (i >= 0) now.splice(i, 1); }
        answer(c.id, now);
      };
      lab.appendChild(inp); lab.appendChild(icon);
      lab.appendChild(document.createTextNode(" " + item));
      wrap.appendChild(lab);
    }
    box.appendChild(wrap);
    return box;
  }

  if (c.tag === "M") {
    if (c.inverted) {
      const invNote = document.createElement("div"); invNote.className = "m-inv-note";
      invNote.textContent = "5 = good, 1 = deficient";
      box.appendChild(invNote);
    }
    const grid = document.createElement("div"); grid.className = "m-anchors";
    for (let lvl = 1; lvl <= 5; lvl++) {
      const a = document.createElement("div");
      a.className = "m-anchor" + (String(state.answers[c.id]) === String(lvl) ? " selected" : "");
      a.innerHTML = `<div class="lvl">${lvl} &middot; ${lvl===1?"0%":lvl===5?"100%":((lvl-1)/4*100)+"%"}</div><div class="anc-text">${anchorFor(c, lvl)}</div>`;
      a.onclick = () => answer(c.id, String(lvl));
      grid.appendChild(a);
    }
    box.appendChild(grid);
    return box;
  }

  if (c.sponsorable) {
    const tri = document.createElement("div"); tri.className = "tri";
    for (const v of ["absent","sponsored","earned"]) {
      const lab = document.createElement("label"); lab.className = "tri-pill";
      const inp = document.createElement("input"); inp.type = "radio"; inp.name = "tri_" + c.id;
      inp.checked = (state.answers[c.id] || "absent") === v;
      inp.onchange = () => answer(c.id, v);
      lab.appendChild(inp);
      lab.appendChild(document.createTextNode(" " + v));
      tri.appendChild(lab);
    }
    box.appendChild(tri);
    return box;
  }

  // Yes / No / N/A
  const tri = document.createElement("div"); tri.className = "yn-tri";
  const cur = state.answers[c.id];
  const curStr = cur === true ? "yes" : cur === false ? "no" : (typeof cur === "string" ? cur : "");
  for (const [v, label] of [["yes","Yes"],["no","No"],["na","N / A"]]) {
    const lab = document.createElement("label");
    lab.className = "yn-pill" + (curStr === v ? " sel-" + v : "");
    const inp = document.createElement("input"); inp.type = "radio"; inp.name = "yn_" + c.id; inp.value = v;
    inp.checked = curStr === v;
    inp.onchange = () => {
      answer(c.id, v);
      tri.querySelectorAll(".yn-pill").forEach(l => l.className = "yn-pill");
      lab.className = "yn-pill sel-" + v;
    };
    lab.appendChild(inp);
    lab.appendChild(document.createTextNode(label));
    tri.appendChild(lab);
  }
  box.appendChild(tri);
  return box;
}

/* ============================================================
   RADAR -- SVG spider chart, brand green accent
   ============================================================ */
const RADAR_DIMS = ["SV","AV","DE","BA","SC","RC"];

function scoreColor(v) {
  if (v < 40) return "#EF4444";
  if (v < 60) return "#F59E0B";
  if (v < 80) return "#22C55E";
  return "#03AF97";
}

function renderRadar(size) {
  const s = size || 240;
  const cx = s/2, cy = s/2;
  const r = s * 0.40;
  const gridLevels = [20, 40, 60, 80, 100];
  const angleFor = i => (Math.PI * 2 * i / RADAR_DIMS.length) - Math.PI/2;
  const pad = 32;

  let svg = `<svg width="${s + pad*2}" height="${s + pad*2}" viewBox="${-pad} ${-pad} ${s + pad*2} ${s + pad*2}" xmlns="http://www.w3.org/2000/svg">`;

  // Concentric gridlines
  for (const g of gridLevels) {
    const pts = RADAR_DIMS.map((_, i) => {
      const rad = r * (g / 100);
      const a = angleFor(i);
      return (cx + Math.cos(a)*rad).toFixed(1) + "," + (cy + Math.sin(a)*rad).toFixed(1);
    }).join(" ");
    const isOuter = g === 100;
    svg += `<polygon points="${pts}" fill="${isOuter ? "rgba(22,28,43,1)" : "none"}" stroke="${isOuter ? "rgba(255,255,255,0.10)" : "rgba(255,255,255,0.05)"}" stroke-width="${isOuter ? "1" : "0.7"}"/>`;
    if (g < 100 && g >= 40) {
      const labelA = angleFor(0) + (Math.PI * 2 / RADAR_DIMS.length) * 0.5;
      const lrad = r * (g / 100);
      const lx = cx + Math.cos(labelA) * lrad, ly = cy + Math.sin(labelA) * lrad;
      svg += `<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" text-anchor="middle" dominant-baseline="middle" font-size="6.5" fill="rgba(255,255,255,0.18)">${g}</text>`;
    }
  }

  // Axes
  for (let i = 0; i < RADAR_DIMS.length; i++) {
    const a = angleFor(i);
    const x2 = cx + Math.cos(a)*r, y2 = cy + Math.sin(a)*r;
    svg += `<line x1="${cx}" y1="${cy}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="rgba(255,255,255,0.08)" stroke-width="0.7"/>`;
    const applicable = buildPointsModel(state.flags).dimApplicable[RADAR_DIMS[i]];
    const lx = cx + Math.cos(a)*(r+20), ly = cy + Math.sin(a)*(r+20);
    const label = applicable ? RADAR_DIMS[i] : RADAR_DIMS[i] + " n/a";
    const fill = applicable ? "rgba(255,255,255,0.55)" : "rgba(255,255,255,0.22)";
    svg += `<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="${fill}" font-weight="700" letter-spacing="1.5">${label}</text>`;
  }

  // Data polygon
  const pts = RADAR_DIMS.map((d, i) => {
    const v = state.radarVals[d];
    const rad = r * (v / 100);
    const a = angleFor(i);
    return (cx + Math.cos(a)*rad).toFixed(1) + "," + (cy + Math.sin(a)*rad).toFixed(1);
  }).join(" ");
  svg += `<polygon points="${pts}" fill="rgba(3,175,151,0.15)" stroke="#03AF97" stroke-width="2"/>`;

  // Dots
  for (let i = 0; i < RADAR_DIMS.length; i++) {
    const v = state.radarVals[RADAR_DIMS[i]];
    if (v === 0) continue;
    const rad = r * (v / 100);
    const a = angleFor(i);
    const px = cx + Math.cos(a)*rad, py = cy + Math.sin(a)*rad;
    svg += `<circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="5" fill="rgba(15,17,23,0.9)"/>`;
    svg += `<circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="3" fill="#03AF97"/>`;
  }
  svg += "</svg>";
  return svg;
}

function animateRadarAxis(dim, target) {
  const start = state.radarVals[dim];
  const t0 = performance.now();
  const dur = 320;
  function step(now) {
    const p = Math.min(1, (now - t0) / dur);
    const eased = 1 - Math.pow(1 - p, 3);
    state.radarVals[dim] = start + (target - start) * eased;
    const rail = document.getElementById("rail");
    if (rail) rail.innerHTML = radarRailHTML();
    if (p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

/* ============================================================
   SCORE RING SVG (animated, color-shifting by score range)
   ============================================================ */
function scoreRingSVG(value, size) {
  const arcR = size * 0.38;
  const circ = 2 * Math.PI * arcR;
  const pct = Math.min(Math.max(value, 0), 100) / 100;
  const dash = circ * pct;
  const gap = circ - dash;
  const offset = circ * 0.25;
  const col = scoreColor(value);
  const glowId = "glow_" + Math.round(value);
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="${glowId}" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <circle cx="${size/2}" cy="${size/2}" r="${arcR}" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="${size*0.07}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${arcR}" fill="none" stroke="${col}" stroke-width="${size*0.07}"
      stroke-dasharray="${dash.toFixed(2)} ${gap.toFixed(2)}"
      stroke-dashoffset="${offset.toFixed(2)}" stroke-linecap="round"
      filter="url(#${glowId})"/>
    <text x="${size/2}" y="${size/2 - size*0.07}" text-anchor="middle" dominant-baseline="middle"
      font-size="${size*0.22}" font-weight="700" fill="#E8ECF0"
      font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">${value.toFixed(1)}</text>
    <text x="${size/2}" y="${size/2 + size*0.13}" text-anchor="middle" dominant-baseline="middle"
      font-size="${size*0.085}" fill="rgba(255,255,255,0.35)" letter-spacing="1.5"
      font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">/ 100</text>
  </svg>`;
}

/* ============================================================
   RADAR RAIL (sticky sidebar)
   ============================================================ */
function radarRailHTML() {
  const dims = RADAR_DIMS.map(d => {
    const s = dimensionScore(d, state);
    const conf = state.confirmed[d];
    return { d, s, conf };
  });
  const comp = composite(state);
  const band = maturityBand(comp);
  const col = scoreColor(comp);
  return `
    <div class="radar-card">
      <h4>VISTA Score</h4>
      <div class="rail-score-center">${scoreRingSVG(comp, 200)}</div>
      <div class="rail-band-center"><span class="band-pill ${band.cls}">${band.label}</span></div>
      <div class="radar-center">${renderRadar(290)}</div>
      <ul class="dim-list">
        ${dims.map(x => {
          const m = DIM_META.find(d => d.key === x.d);
          const valStr = x.s === null ? "n/a" : (x.conf ? x.s.toFixed(1) : "&ndash;");
          const valClass = x.s !== null && x.conf ? "val-confirmed" : "val-unconfirmed";
          return `<li>
            <span class="dim-list-label">${x.d} &middot; ${m ? m.short : x.d}</span>
            <span class="dim-list-val ${valClass}">${valStr}</span>
          </li>`;
        }).join("")}
      </ul>
    </div>
  `;
}

/* ============================================================
   SUB-COMPONENT BAR CHART
   ============================================================ */
function renderSubComponentBars() {
  const section = document.createElement("div"); section.className = "subcomp-chart-section";
  const title = document.createElement("div"); title.className = "chart-section-title";
  title.textContent = "Sub-component breakdown";
  section.appendChild(title);

  const model = buildPointsModel(state.flags);

  for (const dimMeta of DIM_META) {
    const dim = dimMeta.key;
    // Collect sub-components for this dimension
    const subcomps = [];
    const seen = {};
    for (const c of CRITERIA) {
      if (c.dimension !== dim) continue;
      if (seen[c.subComponent]) continue;
      seen[c.subComponent] = true;
      const applicable = CRITERIA.filter(x => x.subComponent === c.subComponent && isApplicable(x, state.flags));
      if (applicable.length === 0) continue;
      // Calculate sub-component score as % of its point budget
      let earned = 0;
      for (const ac of applicable) earned += critValue(ac, state, model);
      const max = c.subComponentPoints;
      const pct = max > 0 ? Math.min(100, (earned / max) * 100) : 0;
      // Shorten label: remove "SC1.1 " prefix style
      const label = c.subComponent.replace(/^SC\d+\.\d+\s+/i, "").replace(/^SC\d+\.\d+/, "");
      subcomps.push({ label, pct, earned, max });
    }
    if (subcomps.length === 0) continue;

    const group = document.createElement("div"); group.className = "chart-dim-group";
    const dimLabel = document.createElement("div"); dimLabel.className = "chart-dim-label";
    dimLabel.textContent = dim + " · " + dimMeta.name;
    group.appendChild(dimLabel);

    for (const sc of subcomps) {
      const barRow = document.createElement("div"); barRow.className = "bar-row";
      const pct = sc.pct;
      const col = pct < 40 ? "var(--red)" : pct < 60 ? "var(--amber)" : pct < 80 ? "var(--green)" : "var(--accent)";
      barRow.innerHTML = `
        <div class="bar-label">${sc.label}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct.toFixed(1)}%;background:${col};"></div></div>
        <div class="bar-score" style="color:${col};">${pct.toFixed(0)}%</div>
      `;
      group.appendChild(barRow);
    }
    section.appendChild(group);
  }
  return section;
}

/* ============================================================
   SUMMARY TAB
   ============================================================ */
function renderSummary() {
  const wrap = document.createElement("div");

  // Actions bar
  const actBar = document.createElement("div");
  actBar.style.cssText = "display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;flex-wrap:wrap;gap:12px;";
  const actHeading = document.createElement("div");
  actHeading.style.cssText = "font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--fg-muted);";
  actHeading.textContent = "Summary & Export";
  const actions = document.createElement("div"); actions.className = "summary-actions";
  const eBtn = document.createElement("button"); eBtn.className = "ghost"; eBtn.textContent = "Export JSON";

  iBtn.onclick = () => document.getElementById("importFile").click();
  const pBtn = document.createElement("button"); pBtn.className = "ghost"; pBtn.textContent = "Print / PDF";
  pBtn.onclick = () => window.print();
  actions.appendChild(eBtn); actions.appendChild(iBtn); actions.appendChild(pBtn);
  actBar.appendChild(actHeading); actBar.appendChild(actions);

  // HERO: Atmospheric score reveal
  const comp = composite(state);
  const band = maturityBand(comp);

  const hero = document.createElement("div"); hero.className = "summary-hero";
  hero.innerHTML =
    '<div class="summary-hero-glow"></div>' +
    '<div class="summary-hero-glow-floor"></div>' +
    '<div class="summary-hero-content">' +
      '<div class="summary-hero-label">Composite VISTA Score</div>' +
      '<div class="summary-hero-ring">' + scoreRingSVG(comp, 300) + '</div>' +
      '<div class="summary-hero-band"><span class="band-pill ' + band.cls + '">' + band.label + '</span></div>' +
      '<div class="summary-hero-subtitle">Visibility Intelligence &amp; Strategic Trust Assessment</div>' +
    '</div>';
  wrap.appendChild(hero);

  // DATA GRID: Radar (left) | Dimension stat cards (right)
  const dataGrid = document.createElement("div"); dataGrid.className = "summary-data-grid";

  // Left: Radar chart
  const radarPanel = document.createElement("div"); radarPanel.className = "summary-radar-panel";
