  radarPanelLabel.textContent = "Dimension Radar";
  radarPanel.appendChild(radarPanelLabel);
  const radarDiv = document.createElement("div");
  radarDiv.innerHTML = renderRadar(480);
  radarPanel.appendChild(radarDiv);
  dataGrid.appendChild(radarPanel);

  // Right: 6 dimension stat cards
  const dimPanel = document.createElement("div"); dimPanel.className = "summary-dim-panel";
  const dimPanelLabel = document.createElement("div"); dimPanelLabel.className = "summary-dim-panel-label";
  dimPanelLabel.textContent = "Dimension Scores";
  dimPanel.appendChild(dimPanelLabel);
  const dimGrid6 = document.createElement("div"); dimGrid6.className = "dim-grid-6";
  for (const d of RADAR_DIMS) {
    const s = dimensionScore(d, state);
    const conf = state.confirmed[d];
    const meta = DIM_META.find(x => x.key === d);
    const valStr = s === null ? "n/a" : s.toFixed(1);
    const c = s !== null ? scoreColor(s) : "var(--fg-muted)";
    const pct = s !== null ? Math.min(100, s) : 0;
    const dimName = meta ? meta.name : d;
    const card = document.createElement("div"); card.className = "dim-stat-card";
    card.style.setProperty("--score-col", c);
    card.innerHTML =
      '<div class="dim-stat-code">' + d + '</div>' +
      '<div class="dim-stat-score" style="color:' + c + ';">' + valStr +
        (!conf && s !== null ? '<span style="font-size:13px;font-weight:400;color:var(--fg-muted);"> *</span>' : '') +
      '</div>' +
      '<div class="dim-stat-name">' + dimName + '</div>' +
      '<div class="dim-stat-bar-bg"><div class="dim-stat-bar-fill" style="width:' + pct.toFixed(1) + '%;background:' + c + ';"></div></div>';
    dimGrid6.appendChild(card);
  }
  dimPanel.appendChild(dimGrid6);
  const unconfNote = document.createElement("div");
  unconfNote.style.cssText = "font-size:10px;color:var(--fg-muted);margin-top:14px;";
  unconfNote.textContent = "* Score not yet confirmed. Go to that tab and click Confirm section to lock it in before exporting.";
  dimPanel.appendChild(unconfNote);
  dataGrid.appendChild(dimPanel);
  wrap.appendChild(dataGrid);

  // Metadata block
  const metaBox = document.createElement("div"); metaBox.className = "sc-inputs"; metaBox.style.marginBottom = "20px";
  metaBox.innerHTML = '<h3>About this brand</h3>' +
    '<div class="note">Fill this in before you start. It saves with your results and identifies the report.</div>';
  const grid = document.createElement("div"); grid.className = "meta-grid";
  const fields = [
    { key:"brand", label:"brand name" },
    { key:"country", label:"country" },
    { key:"sector", label:"sector" },
    { key:"launchYear", label:"year founded", type:"text", placeholder:"e.g. 2018", maxlength:4, inputmode:"numeric" },
    { key:"assessmentDate", label:"assessment date", type:"date" }
  ];
  for (const f of fields) {
    const l = document.createElement("label"); l.textContent = f.label;
    const inp = document.createElement("input");
    inp.type = f.type || "text"; inp.value = state.meta[f.key] || "";
    if (f.placeholder) inp.placeholder = f.placeholder;
    if (f.maxlength) inp.maxLength = f.maxlength;
    if (f.inputmode) inp.inputMode = f.inputmode;
    inp.oninput = e => { state.meta[f.key] = e.target.value; renderAll(); };
    l.appendChild(inp); grid.appendChild(l);
  }
  metaBox.appendChild(grid);
  wrap.appendChild(metaBox);

  // Applicability flags
  const sectorFlagBox = document.createElement("div"); sectorFlagBox.className = "sc-inputs";
  sectorFlagBox.style.marginBottom = "28px";
  sectorFlagBox.innerHTML = '<h3>Which of these apply to this brand?</h3>' +
    '<div class="note">Tick only what is true for this brand. Questions that do not apply are skipped automatically and will not count against the score.</div>';
  const fGrid = document.createElement("div"); fGrid.className = "flags-grid";
  const errSlot = document.createElement("div");
  for (const [flag, def] of Object.entries(APPLICABILITY_FLAGS)) {
    const lab = document.createElement("label");
    const inp = document.createElement("input"); inp.type = "checkbox"; inp.checked = !!state.flags[flag];
    inp.onchange = () => {
      const proposed = { ...state.flags, [flag]: inp.checked };
      const applDims = Object.values(buildPointsModel(proposed).dimApplicable).filter(Boolean).length;
      if (applDims < 4) {
        inp.checked = !inp.checked;
        errSlot.innerHTML = '<div class="flag-error">Cannot disable: this combination would leave only ' + applDims + ' sections active. At least 4 must apply.</div>';
        return;
      }
      errSlot.innerHTML = "";
      state.flags = proposed; state.flagsTouched = true; renderAll();
    };
    lab.appendChild(inp);
    const span = document.createElement("span");
    span.innerHTML = '<strong>' + FLAG_DISPLAY[flag] + '</strong><br><span class="flag-def">' + def + '</span>';
    lab.appendChild(span); fGrid.appendChild(lab);
  }
  sectorFlagBox.appendChild(fGrid); sectorFlagBox.appendChild(errSlot);
  wrap.appendChild(sectorFlagBox);

  // Sub-component bar chart
  const chartDivider = document.createElement("div"); chartDivider.className = "section-divider";
  chartDivider.textContent = "Sub-component breakdown";
  wrap.appendChild(chartDivider);
  wrap.appendChild(renderSubComponentBars());

  // Warning signals
  const flagsDivider = document.createElement("div"); flagsDivider.className = "section-divider";
  flagsDivider.textContent = "Warning signals";
  wrap.appendChild(flagsDivider);

  const flags = computeFlags(state);
  const flagsSection = document.createElement("div"); flagsSection.className = "flags-section";
  const flagsTitle = document.createElement("div"); flagsTitle.className = "flags-section-title";
  flagsTitle.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> Warning signals <span style="font-weight:400;font-size:10px;color:var(--fg-muted);letter-spacing:0;text-transform:none;">not deducted from score</span>';
  flagsSection.appendChild(flagsTitle);
  if (!flags.length) {
    const ok = document.createElement("div"); ok.className = "empty-flags";
    ok.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#22C55E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> All clear. No warning signals detected.';
    flagsSection.appendChild(ok);
  } else {
    for (const f of flags) {
      const alert = document.createElement("div"); alert.className = "flag-alert critical";
      alert.innerHTML = '<svg class="flag-icon flag-alert-icon-critical" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>' +
        '<div><div class="flag-text">' + f.text + '</div>' +
        (f.provisional ? '<div class="flag-prov">early result, verify after 5+ assessments</div>' : '') +
        '</div>';
      flagsSection.appendChild(alert);
    }
  }
  wrap.appendChild(flagsSection);

  // Focus areas
  const scored = RADAR_DIMS
    .map(d => ({ d, s: dimensionScore(d, state), confirmed: state.confirmed[d] }))
    .filter(x => x.s !== null)
    .sort((a, b) => a.s - b.s);

  if (scored.length > 0) {
    const focusDivider = document.createElement("div"); focusDivider.className = "section-divider";
    focusDivider.textContent = "Where to focus next";
    wrap.appendChild(focusDivider);

    const focusSection = document.createElement("div"); focusSection.className = "focus-section";
    focusSection.innerHTML = '<div style="font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--fg-muted);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--line);">Lowest-scoring dimensions</div>';
    const focusList = document.createElement("ul"); focusList.className = "focus-list";
    const top3 = scored.slice(0, Math.min(3, scored.length));
    for (const { d, s, confirmed } of top3) {
      const meta = DIM_META.find(x => x.key === d);
      const prog = progressFor(d);
      const gap = prog.applicable - prog.answered;
      const li = document.createElement("li"); li.className = "focus-item";
      li.innerHTML = '<span class="focus-dim">' + d + ' &middot; ' + (meta ? meta.name : d) + '</span>' +
        '<span class="focus-score">' + s.toFixed(1) + '<span class="focus-max"> / 100</span></span>' +
        '<span class="focus-note">' + (gap > 0 ? gap + " unanswered" : confirmed ? "complete" : "not confirmed") + '</span>';
      focusList.appendChild(li);
    }
    focusSection.appendChild(focusList);
    wrap.appendChild(focusSection);
  }

  // Benchmarking stub
  const pctBox = document.createElement("div");
  pctBox.style.cssText = "margin-top:24px;padding:20px 24px;background:var(--bg-card);border:1px solid var(--line);border-radius:var(--r);";
  pctBox.innerHTML = '<div style="font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--fg-muted);margin-bottom:8px;">How this brand compares</div>' +
    '<div style="font-size:12px;color:var(--fg-muted);">Available once 5 or more brands in this sector have been assessed.</div>';
  wrap.appendChild(pctBox);

  const importNote = document.createElement("div"); importNote.className = "import-note";
  importNote.style.marginTop = "16px";
  importNote.textContent = "Import a .json file previously exported from this tool to resume or merge an earlier session.";
  wrap.appendChild(importNote);

  const authorLine = document.createElement("div");
  authorLine.style.cssText = "margin-top:28px;font-size:11px;color:var(--fg-muted);letter-spacing:0.3px;";
  authorLine.textContent = "Methodology authored by Adhit Satish.";
  wrap.appendChild(authorLine);

  return wrap;
}

/* ============================================================
   EXPORT / IMPORT
   ============================================================ */
function exportJSON() {
  const dims = {};
  for (const d of RADAR_DIMS) dims[d] = { score: dimensionScore(d, state), confirmed: state.confirmed[d] };
  const payload = {
    schema: "vista-v2.0.0",
    buildId: BUILD_ID,
    exportedAt: new Date().toISOString(),
    meta: state.meta,
    applicabilityFlags: state.flags,
    engineVersions: state.engineVersions,
    social: state.social,
    answers: state.answers,
    notes: state.notes,
    dimensions: dims,
    composite: composite(state),
    maturityBand: maturityBand(composite(state)).label,
    flags: computeFlags(state)
  };
  const brand = (state.meta.brand || "brand").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
  const date = state.meta.assessmentDate || new Date().toISOString().slice(0,10);
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `${brand}-${date}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function wireImport() {
  const inp = document.getElementById("importFile");
  inp.onchange = e => {
    const f = e.target.files[0];
    if (!f) return;
    const rd = new FileReader();
    rd.onload = () => {
      try {
        const p = JSON.parse(rd.result);
        if (p.answers) {
          for (const [cid, val] of Object.entries(p.answers)) {
            const crit = CRITERIA.find(c => c.id === cid);
            if (!crit) { console.warn(`import skipped for ${cid}, unknown criterion`); continue; }
            if (isAnswered(crit)) { console.info(`import skipped for ${cid}, existing state value`); continue; }
            state.answers[cid] = val;
          }
        }
        if (p.meta) {
          for (const [k, v] of Object.entries(p.meta)) {
            if (state.meta[k] === "" || state.meta[k] == null) state.meta[k] = v;
          }
        }
        if (p.social) {
          const cur = state.social;
          const scEmpty = cur.primary.followers === 0 && cur.igFollowers === 0 && cur.fbFollowers === 0 &&
            cur.primary.posts.every(x => !x.shares && !x.saves && !x.comments && !x.likes);
          if (scEmpty) state.social = { ...cur, ...p.social };
        }
        if (p.applicabilityFlags && !state.flagsTouched) state.flags = { ...state.flags, ...p.applicabilityFlags };
        if (p.engineVersions) {
          for (const [k, v] of Object.entries(p.engineVersions)) {
            if (!state.engineVersions[k]) state.engineVersions[k] = v;
          }
        }
        if (p.notes) {
          for (const [cid, note] of Object.entries(p.notes)) {
            if (!state.notes[cid]) state.notes[cid] = note;
          }
        }
        if (p.dimensions) {
          for (const d of RADAR_DIMS) {
            state.confirmed[d] = state.confirmed[d] || !!p.dimensions[d]?.confirmed;
            const s = dimensionScore(d, state);
            state.radarVals[d] = state.confirmed[d] && s !== null ? s : 0;
          }
        }
        renderAll();
      } catch (err) { alert("Import failed: " + err.message); }
    };
    rd.readAsText(f);
    inp.value = "";
  };
}

/* ============================================================
   RENDER ORCHESTRATOR
   ============================================================ */
function renderAll() {
  renderTabs();
  const panel = document.getElementById("panel");
  const rail = document.getElementById("rail");
  const main = document.getElementById("main");
  panel.innerHTML = "";
  if (state.activeTab === "SUMMARY") {
    main.classList.add("summary-view");
    rail.style.display = "none";
    panel.appendChild(renderSummary());
  } else {
    main.classList.remove("summary-view");
    rail.style.display = "";
    panel.appendChild(renderDimTab(state.activeTab));
    rail.innerHTML = radarRailHTML();
  }
  if (pendingNextScroll) {
    pendingNextScroll = false;
    setTimeout(scrollToNextUnanswered, 60);
  }
  checkDraftPrompt();
}

/* ============================================================
   BOOT
   ============================================================ */
(function boot() {
  const errs = runAssertions();
  const statusEl = document.getElementById("assert-status");
  if (errs.length) {
    statusEl.textContent = "ASSERTION FAILURE, refusing to render";
    statusEl.style.color = "#EF4444";
    console.error("VISTA assertion failure:", errs);
    document.getElementById("main").innerHTML =
      `<section class="panel"><h2>Refusing to render</h2>
       <p>The inlined criteria failed count / point-reconciliation checks:</p>
       <ul>${errs.map(e => `<li>${e}</li>`).join("")}</ul>
       <p>Fix the data before continuing.</p></section>`;
    return;
  }
  statusEl.textContent = "195 criteria · 49/27/38/26/28/27 ✓";
  console.info("VISTA V.02.00.00. Methodology and instrument authored by Adhit Satish.");
  wireImport();
  window.addEventListener("beforeunload", e => {
    if (progressFor(null).answered > 0) {
      e.preventDefault();
      return e.returnValue = "You have unsaved answers. Export your progress as JSON before closing.";
    }
  });
  renderAll();
})();
