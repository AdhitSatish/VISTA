<!-- VISTA, Visibility Intelligence & Strategic Trust Assessment. Methodology and instrument authored by Adhit Satish. 2026. -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="author" content="Adhit Satish">
<title>VISTA Calculator</title>
<style>

:root {
  --bg: #0F1117;
  --bg-card: #161C2B;
  --bg-card-2: #1C2338;
  --bg-input: #141929;
  --fg: #E8ECF0;
  --fg-2: #8B9BB0;
  --fg-muted: #4E5A6D;
  --accent: #03AF97;
  --accent-dim: rgba(3,175,151,0.08);
  --accent-border: rgba(3,175,151,0.28);
  --accent-glow: rgba(3,175,151,0.18);
  --line: rgba(255,255,255,0.058);
  --line-strong: rgba(255,255,255,0.10);
  --red: #EF4444;
  --amber: #F59E0B;
  --green: #22C55E;
  --r: 12px;
  --r-sm: 8px;
  --r-pill: 100px;
  --header-h: 58px;
  --tab-h: 48px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--fg);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif;
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ---- Scrollbar ---- */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.10); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); }

/* ---- Focus ---- */
:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
  border-radius: 4px;
}

/* ---- HEADER ---- */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: var(--header-h);
  padding: 0 36px;
  background: rgba(15,17,23,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--line);
  position: sticky;
  top: 0;
  z-index: 30;
}
.header-brand { display: flex; flex-direction: column; gap: 2px; }
.header-logo {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: 3.5px;
  text-transform: uppercase;
  color: var(--fg);
}
.header-logo em { color: var(--accent); font-style: normal; }
.header-sub {
  font-size: 9px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--fg-muted);
}
.header-status {
  font-size: 11px;
  letter-spacing: 1px;
  color: var(--fg-muted);
}

/* ---- TABS ---- */
nav.tabs {
  display: flex;
  gap: 0;
  padding: 0 28px;
  background: rgba(15,17,23,0.88);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--line);
  position: sticky;
  top: var(--header-h);
  z-index: 20;
  overflow-x: auto;
  scrollbar-width: none;
}
nav.tabs::-webkit-scrollbar { display: none; }
nav.tabs button {
  position: relative;
  background: transparent;
  border: 0;
  padding: 0 16px;
  height: var(--tab-h);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 1.8px;
  text-transform: uppercase;
  color: var(--fg-muted);
  cursor: pointer;
  font-family: inherit;
  transition: color 0.15s;
  white-space: nowrap;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
}
nav.tabs button::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 12px;
  right: 12px;
  height: 2px;
  border-radius: 2px 2px 0 0;
  background: transparent;
  transition: background 0.15s;
}
nav.tabs button:hover { color: var(--fg-2); }
nav.tabs button.active { color: var(--accent); }
nav.tabs button.active::after { background: var(--accent); }
.tab-count {
  display: block;
  font-size: 9px;
  letter-spacing: 0.5px;
  text-transform: none;
  font-weight: 400;
  opacity: 0.55;
}

/* ---- MAIN LAYOUT ---- */
main {
  display: grid;
  grid-template-columns: 1fr 380px;
  min-height: calc(100vh - var(--header-h) - var(--tab-h));
}
main.summary-view { grid-template-columns: 1fr; }

section.panel {
  min-width: 0;
  padding: 32px 40px 100px;
}
aside.radar-rail {
  background: var(--bg-card);
  border-left: 1px solid var(--line);
  align-self: stretch;
}
.radar-card {
  position: sticky;
  top: calc(var(--header-h) + var(--tab-h));
  padding: 28px 24px;
}

/* ---- TYPOGRAPHY ---- */
.dim-heading {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 6px;
}
.dim-code-badge {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--bg);
  background: var(--accent);
  padding: 3px 9px;
  border-radius: 6px;
}
.dim-title {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 0.3px;
  color: var(--fg);
}
.dim-intro {
  font-size: 13px;
  color: var(--fg-2);
  margin-bottom: 24px;
  line-height: 1.6;
  max-width: 680px;
}

/* ---- STICKY PROGRESS BAR ---- */
.dim-sticky {
  position: sticky;
  top: calc(var(--header-h) + var(--tab-h));
  z-index: 10;
  background: var(--bg);
  border-bottom: 1px solid var(--line);
  padding: 10px 0 12px;
  margin-bottom: 28px;
}
.dim-sticky-inner {
  display: flex;
  align-items: center;
  gap: 12px;
}
.dim-sticky-inner .dl {
  font-size: 10px;
  color: var(--fg-muted);
  white-space: nowrap;
  text-transform: uppercase;
  letter-spacing: 1.5px;
}
.dim-sticky-inner .dbar {
  flex: 1;
  height: 3px;
  background: var(--line-strong);
  border-radius: 3px;
  overflow: hidden;
}
.dim-sticky-inner .dbar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), rgba(3,175,151,0.7));
  border-radius: 3px;
  transition: width 0.4s cubic-bezier(0.16,1,0.3,1);
  box-shadow: 0 0 12px var(--accent-glow);
}
.dim-sticky-inner .dc {
  font-size: 12px;
  font-weight: 500;
  white-space: nowrap;
  color: var(--fg-2);
  font-variant-numeric: tabular-nums;
}
.dim-sticky-inner .dt {
  font-size: 11px;
  color: var(--fg-muted);
  padding-left: 12px;
  border-left: 1px solid var(--line-strong);
  white-space: nowrap;
}

/* ---- TYPE LEGEND ---- */
.type-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 6px 20px;
  font-size: 11px;
  color: var(--fg-2);
  margin-bottom: 24px;
  padding: 10px 14px;
  background: var(--bg-card);
  border-radius: var(--r-sm);
  border: 1px solid var(--line);
}
.type-legend b { color: var(--accent); font-size: 10px; letter-spacing: 0.5px; }

/* ---- SUBCOMPONENT ---- */
.subcomp {
  margin-bottom: 8px;
}
.subcomp-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 16px 18px;
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-left: 3px solid var(--accent);
  border-radius: var(--r-sm);
  cursor: pointer;
  user-select: none;
  transition: border-color 0.15s, background 0.15s;
  margin-bottom: 2px;
}
.subcomp-header:hover {
  border-color: var(--line-strong);
  background: var(--bg-card-2);
}
.subcomp h3 {
  flex: 1;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--fg-2);
  margin: 0;
}
.subcomp-toggle {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--fg-muted);
  font-size: 14px;
  padding: 0;
  transition: transform 0.2s cubic-bezier(0.16,1,0.3,1);
  font-family: inherit;
  line-height: 1;
  display: flex;
  align-items: center;
}
.subcomp.collapsed .subcomp-toggle { transform: rotate(-90deg); }
.subcomp.collapsed .sc-meta,
.subcomp.collapsed .criterion-card { display: none; }

.sc-badge {
  font-size: 10px;
  font-weight: 500;
  color: var(--fg-muted);
  background: var(--bg-input);
  padding: 2px 10px;
  border-radius: var(--r-pill);
  white-space: nowrap;
  border: 1px solid var(--line);
  font-variant-numeric: tabular-nums;
}
.sc-badge.done {
  background: rgba(3,175,151,0.10);
  color: var(--accent);
  border-color: var(--accent-border);
}
.sc-meta {
  font-size: 11px;
  color: var(--fg-muted);
  padding: 6px 16px 10px;
  letter-spacing: 0.2px;
}

/* ---- CRITERION CARDS ---- */
.criterion-card {
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-left: 3px solid transparent;
  border-radius: var(--r);
  padding: 22px 24px;
  margin-bottom: 8px;
  transition: border-color 0.15s, border-left-color 0.2s;
}
.criterion-card.answered {
  border-left-color: var(--accent);
}
.criterion-card:hover {
  border-color: var(--line-strong);
}
.criterion-card.na {
  opacity: 0.30;
  pointer-events: none;
}
.crit-header {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 10px;
}
.crit-id-badge {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding-top: 1px;
}
.crit-id-num {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  color: var(--fg-muted);
}
.crit-tag-pill {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.8px;
  color: var(--accent);
  background: var(--accent-dim);
  border: 1px solid var(--accent-border);
  padding: 1px 6px;
  border-radius: 4px;
}
.crit-text {
  font-size: 14px;
  font-weight: 500;
  color: var(--fg);
  line-height: 1.5;
  flex: 1;
}
.na-badge {
  display: inline-block;
  margin-top: 4px;
  padding: 2px 10px;
  border: 1px solid var(--line-strong);
  border-radius: var(--r-pill);
  font-size: 10px;
  letter-spacing: 1px;
  color: var(--fg-muted);
  text-transform: uppercase;
}

/* ---- HINT EXPAND ---- */
.hint-toggle {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--fg-muted);
  background: none;
  border: none;
  cursor: pointer;
  font-family: inherit;
  padding: 0;
  margin-bottom: 6px;
  transition: color 0.12s;
  letter-spacing: 0.2px;
}
.hint-toggle:hover { color: var(--fg-2); }
.hint-toggle .ht-chevron {
  font-size: 10px;
  transition: transform 0.18s;
  display: inline-block;
}
.hint-toggle.open .ht-chevron { transform: rotate(90deg); }
.hint-body {
  font-size: 12px;
  color: var(--fg-2);
  line-height: 1.65;
  padding: 10px 14px;
  background: var(--bg-input);
  border-radius: var(--r-sm);
  border: 1px solid var(--line);
  margin-bottom: 10px;
  display: none;
}
.hint-body.open { display: block; }
.crit-ev {
  font-size: 11px;
  color: var(--fg-muted);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.crit-ev::before {
  content: '';
  display: inline-block;
  width: 14px;
  height: 14px;
  background: var(--accent-dim);
  border: 1px solid var(--accent-border);
  border-radius: 4px;
  flex-shrink: 0;
}

/* ---- INPUTS: YES/NO/NA PILLS ---- */
.yn-tri {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}
.yn-pill {
  padding: 9px 24px;
  border: 1px solid var(--line-strong);
  border-radius: var(--r-pill);
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  color: var(--fg-2);
  background: var(--bg-input);
  transition: all 0.15s;
  user-select: none;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}
.yn-pill input { display: none; }
.yn-pill:hover { border-color: var(--line-strong); color: var(--fg-2); background: var(--bg-card-2); }
.yn-pill.sel-yes { border-color: var(--accent); background: rgba(3,175,151,0.18); color: var(--accent); font-weight: 600; box-shadow: 0 0 0 1px var(--accent) inset; }
.yn-pill.sel-no  { border-color: var(--red); background: rgba(239,68,68,0.18); color: var(--red); font-weight: 600; box-shadow: 0 0 0 1px var(--red) inset; }
.yn-pill.sel-na  { border-color: var(--line-strong); background: var(--bg-card-2); color: var(--fg-2); }

/* ---- INPUTS: M ANCHORS (1-5) ---- */
.m-inv-note {
  font-size: 10px;
  color: var(--accent);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 8px;
  font-weight: 500;
}
.m-anchors {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
  margin-bottom: 10px;
}
.m-anchor {
  border: 1px solid var(--line);
  padding: 12px 8px;
  border-radius: var(--r-sm);
  font-size: 11px;
  cursor: pointer;
  background: var(--bg-input);
  color: var(--fg-2);
  display: flex;
  flex-direction: column;
  gap: 6px;
  transition: all 0.12s;
}
.m-anchor:hover {
  border-color: var(--accent-border);
  background: var(--bg-card-2);
  color: var(--fg);
}
.m-anchor.selected {
  border-color: var(--accent);
  background: var(--accent-dim);
  color: var(--fg);
  box-shadow: 0 0 0 1px var(--accent-border) inset, 0 0 24px rgba(3,175,151,0.08);
}
.m-anchor .lvl {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.5px;
  color: var(--fg-muted);
}
.m-anchor.selected .lvl { color: var(--accent); }
.m-anchor .anc-text { line-height: 1.4; font-size: 11px; }

/* ---- TRI (BA sponsorable) ---- */
.tri { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.tri-pill {
  border: 1px solid var(--line-strong);
  padding: 6px 16px;
  border-radius: var(--r-pill);
  cursor: pointer;
  font-size: 12px;
  color: var(--fg-muted);
  background: var(--bg-input);
  transition: all 0.12s;
  display: inline-flex;
  align-items: center;
}
.tri-pill input { display: none; }
.tri-pill:has(input:checked) {
  border-color: var(--accent);
  background: var(--accent-dim);
  color: var(--accent);
}

/* ---- CHECKBOXES ---- */
.checklist-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.check-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 14px;
  border: 1px solid var(--line-strong);
  border-radius: var(--r-pill);
  cursor: pointer;
  font-size: 12px;
  color: var(--fg-muted);
  background: var(--bg-input);
  transition: all 0.12s;
  user-select: none;
}
.check-pill input { display: none; }
.check-pill.checked {
  border-color: var(--accent);
  background: var(--accent-dim);
  color: var(--accent);
}
.check-pill .chk-icon {
  width: 14px;
  height: 14px;
  border: 1.5px solid currentColor;
  border-radius: 3px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
}

/* ---- EVIDENCE NOTE ---- */
.crit-note-wrap { margin-top: 8px; }
.crit-note-btn {
  background: none;
  border: 1px solid var(--line);
  border-radius: var(--r-pill);
  padding: 3px 12px;
  font-size: 11px;
  color: var(--fg-muted);
  cursor: pointer;
  font-family: inherit;
  letter-spacing: 0.3px;
  transition: all 0.12s;
}
.crit-note-btn:hover { border-color: var(--accent-border); color: var(--accent); }
.crit-note-area { margin-top: 8px; }
.crit-note-ta {
  width: 100%;
  max-width: 100%;
  box-sizing: border-box;
  background: var(--bg-input);
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  color: var(--fg);
  font-family: inherit;
  font-size: 12px;
  padding: 8px 12px;
  resize: vertical;
  min-height: 48px;
  transition: border-color 0.12s;
}
.crit-note-ta:focus { border-color: var(--accent-border); outline: none; box-shadow: 0 0 0 3px var(--accent-dim); }
.crit-note-ta::placeholder { color: var(--fg-muted); }

/* ---- CONFIRM ROW ---- */
.confirm-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 36px;
  padding-top: 24px;
  border-top: 1px solid var(--line);
}
.live-score { font-size: 28px; font-weight: 700; letter-spacing: -1px; color: var(--fg); font-variant-numeric: tabular-nums; }
.live-score-of { color: var(--fg-muted); font-size: 13px; font-weight: 400; letter-spacing: 0.5px; margin-left: 6px; }
button.confirm {
  background: var(--accent);
  color: var(--bg);
  border: 0;
  padding: 11px 28px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  border-radius: var(--r-sm);
  transition: opacity 0.15s, box-shadow 0.15s;
}
button.confirm:hover { opacity: 0.88; box-shadow: 0 0 20px var(--accent-glow); }
button.ghost {
  background: transparent;
  color: var(--fg-2);
  border: 1px solid var(--line-strong);
  border-radius: var(--r-sm);
  padding: 9px 18px;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
}
button.ghost:hover { border-color: var(--accent-border); color: var(--accent); }

/* ---- RADAR RAIL ---- */
.radar-card h4 {
  font-size: 9px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--fg-muted);
  font-weight: 600;
  margin-bottom: 16px;
}
.rail-score-center { display: flex; justify-content: center; margin-bottom: 8px; }
.rail-band-center { display: flex; justify-content: center; margin-bottom: 20px; }
.band-pill {
  display: inline-block;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  padding: 4px 14px;
  border-radius: var(--r-pill);
  border: 1px solid currentColor;
}
.band-pill.band-invisible  { color: var(--red); border-color: rgba(239,68,68,0.35); }
.band-pill.band-emerging   { color: var(--amber); border-color: rgba(245,158,11,0.35); }
.band-pill.band-developing { color: #60A5FA; border-color: rgba(96,165,250,0.35); }
.band-pill.band-established{ color: var(--green); border-color: rgba(34,197,94,0.35); }
.band-pill.band-leading    { color: var(--accent); border-color: var(--accent-border); }

.dim-list { list-style: none; padding: 0; margin: 0; font-size: 12px; }
.dim-list li {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 7px 0;
  border-bottom: 1px solid var(--line);
  gap: 8px;
}
.dim-list li:last-child { border-bottom: none; }
.dim-list-label { color: var(--fg-muted); font-size: 11px; letter-spacing: 0.5px; }
.dim-list-val {
  font-variant-numeric: tabular-nums;
  font-weight: 600;
  font-size: 13px;
}
.val-confirmed { color: var(--accent); }
.val-unconfirmed { color: var(--fg-muted); }
.radar-center { display: flex; justify-content: center; margin-bottom: 20px; }

/* ---- SC INPUTS ---- */
.sc-inputs {
  border: 1px solid var(--line);
  border-left: 2px solid var(--accent);
  padding: 20px;
  margin-bottom: 24px;
  background: var(--bg-card);
  border-radius: 0 var(--r) var(--r) 0;
}
.sc-inputs h3 {
  margin: 0 0 4px 0;
  font-size: 10px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--fg-2);
  font-weight: 600;
}
.sc-inputs .note {
  color: var(--fg-muted);
  font-size: 12px;
  margin-bottom: 16px;
  line-height: 1.6;
}
.sc-input-style {
  padding: 8px 12px;
  border: 1px solid var(--line-strong);
  border-radius: var(--r-sm);
  font-family: inherit;
  font-size: 13px;
  background: var(--bg-input);
  color: var(--fg);
  transition: border-color 0.12s;
}
.sc-input-style:focus { border-color: var(--accent-border); outline: none; box-shadow: 0 0 0 3px var(--accent-dim); }
.sc-input-label {
  display: flex;
  flex-direction: column;
  gap: 4px;
  font-size: 11px;
  color: var(--fg-muted);
  letter-spacing: 0.5px;
}

  // SC1.3 Technical SEO (15pts, 15 criteria)
  { id:"SV16", dimension:"SV", subComponent:"SC1.3 Technical SEO", subComponentPoints:15, criteriaInSubComponent:13, tag:"A", pattern:null, inverted:false, sponsorable:false, hint:"Go to pagespeed.web.dev, paste the brand's homepage address, and click Analyze. On the Mobile tab, look at the first metric listed under Core Web Vitals. Is it green and showing 2.5 seconds or less? This tells you how fast the main visible content on the page finishes loading.", text:"website main content loads in 2.5 seconds or less on mobile", evidence:"screenshot of PageSpeed results with today's date" },
  { id:"SV17", dimension:"SV", subComponent:"SC1.3 Technical SEO", subComponentPoints:15, criteriaInSubComponent:13, tag:"A", pattern:null, inverted:false, sponsorable:false, hint:"On the same PageSpeed results page, find the metric about page interactivity. Is it green and showing 200 milliseconds or less? This tells you how quickly the page responds when someone clicks a button or taps a link.", text:"website responds quickly when you tap or click something", evidence:"screenshot of PageSpeed results" },
  { id:"SV18", dimension:"SV", subComponent:"SC1.3 Technical SEO", subComponentPoints:15, criteriaInSubComponent:13, tag:"A", pattern:null, inverted:false, sponsorable:false, hint:"On the same PageSpeed results page, find the metric about visual stability. Is it green and showing 0.10 or less? This tells you whether elements on the page shift around or jump unexpectedly while the page is loading.", text:"page layout stays still while loading, nothing jumps around", evidence:"screenshot of PageSpeed results" },
  { id:"SV20", dimension:"SV", subComponent:"SC1.3 Technical SEO", subComponentPoints:15, criteriaInSubComponent:13, tag:"A", pattern:null, inverted:false, sponsorable:false, hint:"In Google, type the word site: followed immediately by the brand's web address with no space between them (for example, site:brandx.lk). Do the homepage, product pages, and other important pages all appear in the results?", text:"all key pages from the website show up in Google", evidence:"screenshot of Google results showing the website's pages" },
  { id:"SV21", dimension:"SV", subComponent:"SC1.3 Technical SEO", subComponentPoints:15, criteriaInSubComponent:13, tag:"A", pattern:null, inverted:false, sponsorable:false, hint:"On the brand's homepage, right-click anywhere on the page and choose View Page Source. In the new tab that opens, press Ctrl+F and search for the word title. Is there a title line with a clear, descriptive name no longer than about 60 characters?", text:"homepage has a short, clear title under 60 characters", evidence:"screenshot of the page source code" },
  { id:"SV22", dimension:"SV", subComponent:"SC1.3 Technical SEO", subComponentPoints:15, criteriaInSubComponent:13, tag:"A", pattern:null, inverted:false, sponsorable:false, hint:"In the same page source, search for the phrase meta name=description. Is there a written description there that is no longer than about 160 characters?", text:"homepage has a written description under 160 characters", evidence:"screenshot of the page source code" },
  { id:"SV23", dimension:"SV", subComponent:"SC1.3 Technical SEO", subComponentPoints:15, criteriaInSubComponent:13, tag:"A", pattern:null, inverted:false, sponsorable:false, hint:"Go to validator.schema.org and paste the brand's homepage address into the search box. Click Run Test. In the list of results that appears, does the word Organization show up anywhere?", text:"homepage has organisation data that Google can read", evidence:"screenshot of the validator results" },
  { id:"SV24", dimension:"SV", subComponent:"SC1.3 Technical SEO", subComponentPoints:15, criteriaInSubComponent:13, tag:"A", pattern:null, inverted:false, sponsorable:false, hint:"Go to validator.schema.org and paste a product page address into the search box. Click Run Test. In the list of results that appears, does the word Product show up anywhere?", text:"product pages have product data that Google can read", evidence:"screenshot of the validator results" },

  { id:"SV26", dimension:"SV", subComponent:"SC1.3 Technical SEO", subComponentPoints:15, criteriaInSubComponent:13, tag:"A", pattern:null, inverted:false, sponsorable:false, hint:"In the browser address bar, type the brand's website address and then add /sitemap.xml at the end (for example, brandx.lk/sitemap.xml). Does a page full of links load, rather than an error message?", text:"website has a site map file at /sitemap.xml", evidence:"screenshot of the sitemap page loading correctly" },
  { id:"SV27", dimension:"SV", subComponent:"SC1.3 Technical SEO", subComponentPoints:15, criteriaInSubComponent:13, tag:"A", pattern:null, inverted:false, sponsorable:false, hint:"In the browser address bar, type the brand's website address and then add /robots.txt at the end (for example, brandx.lk/robots.txt). Does a page of plain text load?", text:"website has a robots file at /robots.txt", evidence:"screenshot of the robots file loading correctly" },
  { id:"SV28", dimension:"SV", subComponent:"SC1.3 Technical SEO", subComponentPoints:15, criteriaInSubComponent:13, tag:"A", pattern:null, inverted:false, sponsorable:false, hint:"Type the brand's website address starting with http:// instead of https://. Does the browser automatically redirect you to the secure version and show a padlock icon in the address bar?", text:"website automatically uses a secure connection everywhere", evidence:"screenshot of the browser address bar showing https" },
  { id:"SV29", dimension:"SV", subComponent:"SC1.3 Technical SEO", subComponentPoints:15, criteriaInSubComponent:13, tag:"A", pattern:null, inverted:false, sponsorable:false, hint:"Open the page source for the homepage and two other key pages (right-click, View Page Source, then press Ctrl+F and search for canonical). Is a line with canonical present on each page?", text:"key pages each point to their own correct web address", evidence:"screenshot of the page source code" },

  { id:"SV38", dimension:"SV", subComponent:"SC1.4 Local SEO / GBP", subComponentPoints:15, criteriaInSubComponent:9, tag:"A", pattern:null, inverted:false, sponsorable:false, hint:"Google the brand's type of business and city (for example, electronics store Colombo). Does the brand appear in the map section at the top of the results, showing a small map and a list of three businesses?", text:"brand appears in the map results at the top of a local Google search", evidence:"screenshot of Google results showing the map section" },
  { id:"SV39", dimension:"SV", subComponent:"SC1.4 Local SEO / GBP", subComponentPoints:15, criteriaInSubComponent:9, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Check the business name, address, and phone number in three places: the brand's website footer, the Google listing, and Facebook. Do all three match exactly, word for word?", text:"business name, address, and phone number match across all platforms", evidence:"notes comparing the name, address, and phone across all 3 places" },

  { id:"SV40", dimension:"SV", subComponent:"SC1.5 Domain architecture", subComponentPoints:10, criteriaInSubComponent:3, tag:"A", pattern:null, inverted:false, sponsorable:false, hint:"Look at the brand's web address in the browser bar. Is it on its own address (like brandx.lk or brandx.com), and not tucked inside another company's site (like bigcompany.com/brandx)?", text:"brand has its own website domain, not a folder inside another company's site", evidence:"screenshot of the browser address bar" },

  { id:"SV43", dimension:"SV", subComponent:"SC1.5 Domain architecture", subComponentPoints:10, criteriaInSubComponent:3, tag:"A", pattern:null, inverted:false, sponsorable:false, hint:"Click on each product listed on the site. Does each one open on its own page with its own web address that you could copy and share with someone?", text:"every product has its own page with its own web address", evidence:"web addresses of each product page" },

  { id:"AV01", dimension:"AV", subComponent:"SC2.1 GEO brand mention in AI answers", subComponentPoints:25, criteriaInSubComponent:6, tag:"M", pattern:"A", inverted:false, sponsorable:false, hint:"Open ChatGPT, Perplexity, Gemini, and Claude. In each one, type the main question a customer would ask to find this category (for example, what is the best luxury SUV in Sri Lanka). Count how many of the four give an answer that names the brand. Match the count to the level below.", text:"brand is named by AI tools when asked the main category question", evidence:"screenshots from all 4 AI tools" },
  { id:"AV02", dimension:"AV", subComponent:"SC2.1 GEO brand mention in AI answers", subComponentPoints:25, criteriaInSubComponent:6, tag:"M", pattern:"A", inverted:false, sponsorable:false, hint:"Ask all four AI tools a question specific to the product type (for example, best electric SUV in Sri Lanka). In how many of the four answers does the brand get mentioned by name? Match the count to the level below.", text:"brand is named by AI tools when asked about product type", evidence:"screenshots from all 4 AI tools" },
  { id:"AV03", dimension:"AV", subComponent:"SC2.1 GEO brand mention in AI answers", subComponentPoints:25, criteriaInSubComponent:6, tag:"M", pattern:"A", inverted:false, sponsorable:false, hint:"Ask all four AI tools a lifestyle question (for example, best luxury family SUV in Sri Lanka). In how many of the four answers does the brand appear by name? Match the count to the level below.", text:"brand is named by AI tools when asked a lifestyle question", evidence:"screenshots from all 4 AI tools" },
  { id:"AV04", dimension:"AV", subComponent:"SC2.1 GEO brand mention in AI answers", subComponentPoints:25, criteriaInSubComponent:6, tag:"M", pattern:"A", inverted:false, sponsorable:false, hint:"Ask all four AI tools a price question (for example, best SUV under 30 million LKR in Sri Lanka). In how many of the four answers does the brand appear by name? Match the count to the level below.", text:"brand is named by AI tools when asked a price question", evidence:"screenshots from all 4 AI tools" },
  { id:"AV05", dimension:"AV", subComponent:"SC2.1 GEO brand mention in AI answers", subComponentPoints:25, criteriaInSubComponent:6, tag:"M", pattern:"B", inverted:false, sponsorable:false, hint:"Go back and read every AI answer that mentioned the brand. Is the way the brand is described positive (a strong option, highly regarded) or cautious (but reliability is unproven, limited service network)? Match the overall tone to the level below.", text:"when AI tools mention the brand, the description sounds positive", evidence:"screenshots of each AI answer that mentioned the brand" },
  { id:"AV06", dimension:"AV", subComponent:"SC2.1 GEO brand mention in AI answers", subComponentPoints:25, criteriaInSubComponent:6, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Ask the AI assistant a category question without typing the brand name at all, for example, the best option in this product type or the top choice in this space. Does the brand come up on its own? Also, check by asking a completely different question that has nothing to do with the brand, and confirm it does not appear there.", text:"brand comes up in AI answers without being named in the question", evidence:"screenshots of the AI answers" },
  // SC2.2 GEO source ecosystem (15pts, 4)
  { id:"AV07", dimension:"AV", subComponent:"SC2.2 GEO source ecosystem quality", subComponentPoints:15, criteriaInSubComponent:4, tag:"M", pattern:"A", inverted:false, sponsorable:false, hint:"Look at the sources or citations shown under each AI answer. Count how many different websites are referenced across all four tools. Match the total number of distinct sources to the level below.", text:"AI tools reference at least 3 different websites as sources", evidence:"screenshots of the AI answers with sources visible" },
  { id:"AV08", dimension:"AV", subComponent:"SC2.2 GEO source ecosystem quality", subComponentPoints:15, criteriaInSubComponent:4, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Click through the sources listed under the AI answers. Is at least one of them an independent news site or review outlet, rather than the brand's own website or a press release?", text:"at least one AI source is from an independent publication, not the brand itself", evidence:"screenshot of the independent source link" },
  { id:"AV09", dimension:"AV", subComponent:"SC2.2 GEO source ecosystem quality", subComponentPoints:15, criteriaInSubComponent:4, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Look through the sources cited by any of the AI tools. Does the brand's own website appear as one of the cited sources?", text:"at least one AI tool cites the brand's own website as a source", evidence:"screenshot showing the brand's site as a source" },
  { id:"AV10", dimension:"AV", subComponent:"SC2.2 GEO source ecosystem quality", subComponentPoints:15, criteriaInSubComponent:4, tag:"M", pattern:"B", inverted:true, inlineAnchors:{1:"The main source AI engines cite has significant errors about this brand (wrong prices, specs, or outdated info)",2:"A key cited source has notable inaccuracies about this brand",3:"Sources are mostly accurate; one has minor but noticeable errors",4:"Minor error in a secondary source only; main source is accurate",5:"Every source the AI engines cite is current and factually correct about this brand"}, sponsorable:false, hint:"Find the website that the AI tools reference most often about this brand. Open it and check whether the facts it states about the brand, including prices, specifications, and availability, are accurate and current. Match to the level below.", text:"the sources AI tools reference about the brand are accurate and up to date", evidence:"notes on the accuracy of the main source" },

  { id:"AV16", dimension:"AV", subComponent:"SC2.3 AEO buyer-Q answers on owned surface", subComponentPoints:20, criteriaInSubComponent:8, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Browse the brand's website. Is there content answering the specific questions buyers have about this product type, for example, charging and range for electric vehicles, software setup for tech products, or formulation details for pharmaceuticals?", text:"brand's website answers the specific technical questions buyers have", evidence:"web address if found, or note that it is missing" },
  { id:"AV17", dimension:"AV", subComponent:"SC2.3 AEO buyer-Q answers on owned surface", subComponentPoints:20, criteriaInSubComponent:8, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Browse the brand's website. Does any page cover safety, such as safety test results, safety features, or driver assistance systems?", text:"brand's website covers safety information", evidence:"web address if found, or note that it is missing" },
  { id:"AV18", dimension:"AV", subComponent:"SC2.3 AEO buyer-Q answers on owned surface", subComponentPoints:20, criteriaInSubComponent:8, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Browse the brand's website. Does any page make the case for why someone should choose this brand instead of the most popular competitor?", text:"brand's website explains why you should choose this brand over the main competitor", evidence:"web address if found, or note that it is missing" },
  // SC2.4 AEO quality (15pts, 4)
  { id:"AV19", dimension:"AV", subComponent:"SC2.4 AEO answer quality + structure", subComponentPoints:15, criteriaInSubComponent:4, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Open the FAQ or help pages on the brand's website. Are the answers set up as a clear question followed immediately by a direct answer, rather than buried inside long paragraphs?", text:"FAQ answers are written as a clear question followed by a direct answer", evidence:"web address of the FAQ page" },
  { id:"AV20", dimension:"AV", subComponent:"SC2.4 AEO answer quality + structure", subComponentPoints:15, criteriaInSubComponent:4, tag:"A", pattern:null, inverted:false, sponsorable:false, hint:"Go to validator.schema.org and paste the FAQ page address into the search box. Click Run Test. In the list of results that appears, does the word FAQPage show up anywhere?", text:"FAQ pages are marked up so that Google can display answers directly in search results", evidence:"screenshot of the validator results" },
  { id:"AV21", dimension:"AV", subComponent:"SC2.4 AEO answer quality + structure", subComponentPoints:15, criteriaInSubComponent:4, tag:"M", pattern:"E", inverted:false, sponsorable:false, hint:"Read the first few lines under several question headings on the FAQ page. Does a short, direct answer come first (around 40 to 60 words), with more detail following after? Match how consistently this happens to the level below.", text:"FAQ answers start with a short, direct answer of about 40 to 60 words", evidence:"notes from reading the FAQ answers" },
  { id:"AV22", dimension:"AV", subComponent:"SC2.4 AEO answer quality + structure", subComponentPoints:15, criteriaInSubComponent:4, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Spot-check the facts inside the answers: prices, specs, and dates. Is everything still accurate and up to date?", text:"FAQ answers are current with accurate prices and specs", evidence:"web address of the page checked" },
  // SC2.5 AEO comparison (15pts, 3)
  { id:"AV23", dimension:"AV", subComponent:"SC2.5 AEO comparison content", subComponentPoints:15, criteriaInSubComponent:3, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"On the brand's website, is there a page that directly compares the brand against its main competitor, showing why the brand is the better choice?", text:"brand's website has a page directly comparing itself to its main competitor", evidence:"web address if found, or note that it is missing" },
  { id:"AV24", dimension:"AV", subComponent:"SC2.5 AEO comparison content", subComponentPoints:15, criteriaInSubComponent:3, tag:"M", pattern:"D", inverted:false, sponsorable:false, hint:"On that comparison page, tick which of these topics it covers: resale value, service costs, reliability, price, and specifications. Match the number of topics covered to the level below.", text:"comparison page covers resale value, service costs, reliability, price, and specs", evidence:"notes on what topics the comparison page covers" },
  { id:"AV25", dimension:"AV", subComponent:"SC2.5 AEO comparison content", subComponentPoints:15, criteriaInSubComponent:3, tag:"A", pattern:null, inverted:false, sponsorable:false, hint:"Check that the comparison page appears in Google (type site: followed by the brand's web address and look for it) and that it is reachable via a link somewhere on the site, not hidden with no links pointing to it.", text:"comparison page appears in Google and has links pointing to it on the site", evidence:"screenshot of Google results and notes on links to the page" },
  // SC2.6 Objection preemption (10pts, 2)
  { id:"AV26", dimension:"AV", subComponent:"SC2.6 Objection preemption", subComponentPoints:10, criteriaInSubComponent:2, tag:"M", pattern:"D", inverted:false, sponsorable:false, hint:"Think about the main concerns or objections customers raise about this brand (you will collect these during the RC section). For each one, check whether the brand's website addresses it somewhere. Match the share covered to the level below.", text:"brand's website addresses the common complaints customers raise about it", evidence:"notes cross-referencing complaints found in the Reputation section" },
  { id:"AV27", dimension:"AV", subComponent:"SC2.6 Objection preemption", subComponentPoints:10, criteriaInSubComponent:2, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"What is the single complaint about this brand that comes up most often? Is there a specific piece of content on the brand's website that directly addresses and counters that concern?", text:"brand's website has content countering the most repeated complaint about it", evidence:"web address if found, or note that it is missing" },

  // ========== DE, Digital Experience (39) ==========
  // SC3.1 IA completeness (20pts, 10)
  { id:"DE01", dimension:"DE", subComponent:"SC3.1 Info architecture completeness", subComponentPoints:20, criteriaInSubComponent:10, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Open the site menu. Is there an About page or brand story page that explains who the brand is?", text:"website has an About page or brand story page", evidence:"web address of the About page" },
  { id:"DE02", dimension:"DE", subComponent:"SC3.1 Info architecture completeness", subComponentPoints:20, criteriaInSubComponent:10, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Does every product in the range have its own dedicated page on the website?", text:"every product has its own dedicated page on the website", evidence:"web addresses of each product page" },
  { id:"DE03", dimension:"DE", subComponent:"SC3.1 Info architecture completeness", subComponentPoints:20, criteriaInSubComponent:10, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Is there a page about what happens after someone buys, such as the ownership experience or after-sales support?", text:"website has a page about what happens after you buy", evidence:"web address of the page if found, or note that it is missing" },
  { id:"DE04", dimension:"DE", subComponent:"SC3.1 Info architecture completeness", subComponentPoints:20, criteriaInSubComponent:10, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Is there a page explaining servicing and maintenance?", text:"website has a page about servicing and maintenance", evidence:"web address of the page if found, or note that it is missing" },
  { id:"DE05", dimension:"DE", subComponent:"SC3.1 Info architecture completeness", subComponentPoints:20, criteriaInSubComponent:10, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Is there a page with warranty information?", text:"website has a page with warranty information", evidence:"web address of the warranty page if found, or note that it is missing" },
  { id:"DE06", dimension:"DE", subComponent:"SC3.1 Info architecture completeness", subComponentPoints:20, criteriaInSubComponent:10, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Is there a page about financing or leasing options?", text:"website has a page about financing or leasing options", evidence:"web address of the page if found, or note that it is missing" },
  { id:"DE07", dimension:"DE", subComponent:"SC3.1 Info architecture completeness", subComponentPoints:20, criteriaInSubComponent:10, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Is there a page explaining why someone should choose this brand, or how it compares to alternatives?", text:"website has a page explaining why you should choose this brand", evidence:"web address of the page if found, or note that it is missing" },
  { id:"DE08", dimension:"DE", subComponent:"SC3.1 Info architecture completeness", subComponentPoints:20, criteriaInSubComponent:10, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Is there a page where a customer can book an appointment, a test drive, or a consultation?", text:"website has a page where you can book an appointment or test drive", evidence:"web address of the booking page if found, or note that it is missing" },
  { id:"DE09", dimension:"DE", subComponent:"SC3.1 Info architecture completeness", subComponentPoints:20, criteriaInSubComponent:10, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Is there a contact page that shows where the brand is physically located, with a map, address, or directions?", text:"website has a contact page with the physical location and map", evidence:"web address of the contact page" },
  { id:"DE10", dimension:"DE", subComponent:"SC3.1 Info architecture completeness", subComponentPoints:20, criteriaInSubComponent:10, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Is there an FAQ page?", text:"website has a frequently asked questions page", evidence:"web address of the FAQ page if found, or note that it is missing" },
  // SC3.2 Mobile (15pts, 5)
  { id:"DE11", dimension:"DE", subComponent:"SC3.2 Mobile experience", subComponentPoints:15, criteriaInSubComponent:5, tag:"A", pattern:null, inverted:false, sponsorable:false, hint:"Go to pagespeed.web.dev, paste the homepage address, click Analyze, and go to the Mobile tab. Does the page receive a passing mobile-friendly result?", text:"website passes Google's mobile-friendly test", evidence:"screenshot of the mobile test result" },
  { id:"DE12", dimension:"DE", subComponent:"SC3.2 Mobile experience", subComponentPoints:15, criteriaInSubComponent:5, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Open the site on a phone, or in your browser press F12 and click the phone icon to switch to a phone-sized view. Scroll through the main pages. Is the layout clean with no content spilling off the sides of the screen?", text:"website layout looks correct on a phone with nothing cut off or spilling sideways", evidence:"screenshot of the website on a phone-sized screen" },
  { id:"DE13", dimension:"DE", subComponent:"SC3.2 Mobile experience", subComponentPoints:15, criteriaInSubComponent:5, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"In phone view, tap the buttons and links on the page. Are they large enough to press easily with a finger, without needing to zoom in?", text:"buttons and links on mobile are large enough to tap easily with a finger", evidence:"screenshot of the website on a phone-sized screen" },
  { id:"DE14", dimension:"DE", subComponent:"SC3.2 Mobile experience", subComponentPoints:15, criteriaInSubComponent:5, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"In phone view, open the navigation menu. Does it open, scroll, and work correctly?", text:"the navigation menu works correctly on a phone", evidence:"notes from testing the menu on a phone" },
  { id:"DE15", dimension:"DE", subComponent:"SC3.2 Mobile experience", subComponentPoints:15, criteriaInSubComponent:5, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"In phone view, read the main text on a page. Can you read it clearly without needing to zoom in?", text:"text on the website is easy to read on a phone without zooming in", evidence:"screenshot of text on a phone-sized screen" },
  // SC3.3 Lead capture (15pts, 5)
  { id:"DE16", dimension:"DE", subComponent:"SC3.3 Lead capture", subComponentPoints:15, criteriaInSubComponent:5, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Open the brand's homepage on a desktop computer. Before scrolling at all, is there at least one clear button or link that tells you what to do next, such as Book, Enquire, or Call?", text:"there is at least one clear action button visible on the homepage without scrolling", evidence:"screenshot of the homepage without scrolling" },
  { id:"DE17", dimension:"DE", subComponent:"SC3.3 Lead capture", subComponentPoints:15, criteriaInSubComponent:5, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Across the whole website, are there multiple ways for a visitor to get in touch or take action, for example, book an appointment, send a WhatsApp message, call, or fill in a form? Or is there only one single option?", text:"the website offers multiple ways to get in touch, not just one", evidence:"screenshots showing the different contact options" },
  { id:"DE18", dimension:"DE", subComponent:"SC3.3 Lead capture", subComponentPoints:15, criteriaInSubComponent:5, tag:"M", pattern:"bespoke-DE18", inverted:false, sponsorable:false, hint:"Fill in the main contact or booking form yourself. Is it quick and easy to complete, asking only for what is necessary? Match to the level below.", text:"the main contact or booking form is quick and easy to fill in", evidence:"screenshot of the completed form" },
  { id:"DE19", dimension:"DE", subComponent:"SC3.3 Lead capture", subComponentPoints:15, criteriaInSubComponent:5, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Submit the form using test details. Does a clear confirmation message appear right away telling you what will happen next?", text:"after submitting the form, a clear confirmation message appears", evidence:"screenshot of the confirmation message after submitting" },
  { id:"DE20", dimension:"DE", subComponent:"SC3.3 Lead capture", subComponentPoints:15, criteriaInSubComponent:5, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Besides forms, can you reach the brand through other means that are easy to find on the site, such as a visible phone number, a WhatsApp button, or a physical address?", text:"the website shows a phone number, WhatsApp button, or address beyond just a form", evidence:"screenshot showing the contact options available" },
  // SC3.4 Purchase journey (15pts, 4)
  { id:"DE21", dimension:"DE", subComponent:"SC3.4 Purchase journey", subComponentPoints:15, criteriaInSubComponent:4, tag:"M", pattern:"D", inverted:false, sponsorable:false, hint:"Imagine you know nothing about this brand. Using only the website, could you fully learn about each product's specs, features, and how the options differ, without needing to call or visit? Match how well the site answers those questions to the level below.", text:"a visitor can learn everything about each product from the website alone", evidence:"notes on what you could and could not find about each product" },
  { id:"DE22", dimension:"DE", subComponent:"SC3.4 Purchase journey", subComponentPoints:15, criteriaInSubComponent:4, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Does the website let you compare products or options side by side?", text:"the website lets you compare products or options side by side", evidence:"web address of the comparison tool or page if it exists" },
  { id:"DE23", dimension:"DE", subComponent:"SC3.4 Purchase journey", subComponentPoints:15, criteriaInSubComponent:4, tag:"M", pattern:"bespoke-DE23", inverted:false, sponsorable:false, hint:"Walk through the whole journey yourself: land on the homepage, browse products, compare options, and try to book. At each step, is it obvious what to do next? Match how clear the path is to the level below.", text:"the journey from landing on the site to taking action is clear at every step", evidence:"notes from walking through the full journey on the site" },
  { id:"DE24", dimension:"DE", subComponent:"SC3.4 Purchase journey", subComponentPoints:15, criteriaInSubComponent:4, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"While browsing a product page, can you find pricing or clear price guidance without having to leave what you were looking at?", text:"pricing or price guidance is visible while browsing product pages", evidence:"web address where pricing was found" },
  // SC3.5 Visual + brand (10pts, 3)
  { id:"DE25", dimension:"DE", subComponent:"SC3.5 Visual + brand consistency", subComponentPoints:10, criteriaInSubComponent:3, tag:"M", pattern:"E", inverted:false, sponsorable:false, hint:"Open five or six different pages of the site. Are the fonts, colors, button styles, and spacing the same across all of them? Match how consistent they are to the level below.", text:"the same design style is used consistently across all pages", evidence:"screenshots comparing a few pages side by side" },
  { id:"DE26", dimension:"DE", subComponent:"SC3.5 Visual + brand consistency", subComponentPoints:10, criteriaInSubComponent:3, tag:"M", pattern:"F", inverted:false, sponsorable:false, hint:"Does the website look and feel like it matches the quality level the brand claims? A premium brand should have a premium-looking site. Match to the level below.", text:"the visual look of the website matches the brand's level and audience", evidence:"screenshots of the overall visual look" },
  { id:"DE27", dimension:"DE", subComponent:"SC3.5 Visual + brand consistency", subComponentPoints:10, criteriaInSubComponent:3, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Browse through the site looking for anything that seems unfinished: placeholder fonts, generic stock icons, dummy text, or sections that look like they came from a template and were never customized. Tick yes only if you find none.", text:"no generic template elements or off-brand design are visible on the site", evidence:"notes on any off-brand or generic elements spotted" },
  // SC3.6 Performance (10pts, 5)
  { id:"DE28", dimension:"DE", subComponent:"SC3.6 Performance", subComponentPoints:10, criteriaInSubComponent:4, tag:"A", pattern:null, inverted:false, sponsorable:false, hint:"Go to pagespeed.web.dev, paste the homepage address, click Analyze, and open the Desktop tab. Is the Performance score 70 or higher?", text:"website scores 70 or above on the Google desktop speed test", evidence:"screenshot of the PageSpeed desktop results" },

  { id:"DE30", dimension:"DE", subComponent:"SC3.6 Performance", subComponentPoints:10, criteriaInSubComponent:4, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Browse through the main pages of the site. Do all images load fully, with no broken image icons or missing pictures?", text:"no images or files are missing or broken on the main pages", evidence:"notes listing any broken or missing items found" },
  { id:"DE31", dimension:"DE", subComponent:"SC3.6 Performance", subComponentPoints:10, criteriaInSubComponent:4, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Browse the site looking for placeholder or unfinished content, like coming soon sections or dummy text. Tick yes only if none is found.", text:"no placeholder or dummy text is visible anywhere on the live site", evidence:"notes listing any placeholder text spotted" },
  { id:"DE32", dimension:"DE", subComponent:"SC3.6 Performance", subComponentPoints:10, criteriaInSubComponent:4, tag:"A", pattern:null, inverted:false, sponsorable:false, hint:"Press F12 on the keyboard. A panel opens at the bottom or side of the screen. Click the tab labeled Console. Reload the page and click around the site. Are there any red error messages? Tick yes only if there are none.", text:"no technical errors appear in the browser developer console", evidence:"screenshot of the browser console showing no errors" },
  // SC3.7 Accessibility (5pts, 3)
  { id:"DE33", dimension:"DE", subComponent:"SC3.7 Accessibility", subComponentPoints:5, criteriaInSubComponent:3, tag:"A", pattern:null, inverted:false, sponsorable:false, hint:"Press F12 and click the tab labeled Lighthouse. Click Analyze page load and wait for the results. Under Accessibility, does the image alt-text check show as passed?", text:"all images on the site have descriptive text for screen readers", evidence:"screenshot of the accessibility scan results" },
  { id:"DE34", dimension:"DE", subComponent:"SC3.7 Accessibility", subComponentPoints:5, criteriaInSubComponent:3, tag:"A", pattern:null, inverted:false, sponsorable:false, hint:"In the same Lighthouse results, does the color contrast check show as passed?", text:"text and background colours have enough contrast to be easy to read", evidence:"screenshot of the contrast scan results" },
  { id:"DE35", dimension:"DE", subComponent:"SC3.7 Accessibility", subComponentPoints:5, criteriaInSubComponent:3, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Set your mouse aside. Using only the Tab key and Enter key on your keyboard, try to navigate through the main menu and reach the booking or contact form. Can you get there without using the mouse?", text:"the website can be navigated using only a keyboard", evidence:"notes from testing keyboard navigation" },
  // SC3.8 Ownership content (10pts, 4)
  { id:"DE36", dimension:"DE", subComponent:"SC3.8 Ownership / post-purchase content", subComponentPoints:10, criteriaInSubComponent:4, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Is the service network published on the website, showing the locations of service points with their addresses and contact details?", text:"website shows where you can find or buy the product", evidence:"web address of the locations or stockist page" },
  { id:"DE37", dimension:"DE", subComponent:"SC3.8 Ownership / post-purchase content", subComponentPoints:10, criteriaInSubComponent:4, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Are the warranty terms detailed enough to answer a real question, such as how many years it covers, the kilometre limit, and what is not included?", text:"full warranty terms are detailed and easy to find on the website", evidence:"web address of the warranty page" },
  { id:"DE38", dimension:"DE", subComponent:"SC3.8 Ownership / post-purchase content", subComponentPoints:10, criteriaInSubComponent:4, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Are there resources on the website for existing owners, such as manuals, guides, or support pages?", text:"website has resources to help existing customers, such as manuals or support", evidence:"web address of the owner resources or support page" },
  { id:"DE39", dimension:"DE", subComponent:"SC3.8 Ownership / post-purchase content", subComponentPoints:10, criteriaInSubComponent:4, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"Is there specific guidance for owners about what is unique to this type of product, for example, charging tips for electric vehicles, care instructions for sustainable materials, or account setup for software products?", text:"website explains how to use or own this specific type of product", evidence:"web address of the product-specific guidance page" },

  // ========== BA, Brand Authority (27, BA09 deleted) ==========

  { id:"BA01", dimension:"BA", subComponent:"SC4.1 Editorial volume + recency", subComponentPoints:20, criteriaInSubComponent:5, tag:"S", pattern:null, inverted:false, sponsorable:true, hint:"Google the brand name followed by the word review, and then separately search the brand name followed by the word news. Count the articles written by people or outlets that have nothing to do with the brand itself. Are there at least 5?", text:"at least 5 independent articles about the brand exist online", evidence:"web addresses of each article found" },
  { id:"BA02", dimension:"BA", subComponent:"SC4.1 Editorial volume + recency", subComponentPoints:20, criteriaInSubComponent:5, tag:"S", pattern:null, inverted:false, sponsorable:true, hint:"Look at the dates on those articles. Is coverage spread across different time periods, rather than being a single burst of articles when the brand first launched?", text:"independent coverage continues over time, not only at launch", evidence:"web addresses with the publication dates" },
  { id:"BA03", dimension:"BA", subComponent:"SC4.1 Editorial volume + recency", subComponentPoints:20, criteriaInSubComponent:5, tag:"S", pattern:null, inverted:false, sponsorable:true, hint:"Is at least one of those third-party articles dated within the last 90 days?", text:"at least one independent article has been published in the last 90 days", evidence:"web address with the publication date" },
  { id:"BA04", dimension:"BA", subComponent:"SC4.1 Editorial volume + recency", subComponentPoints:20, criteriaInSubComponent:5, tag:"S", pattern:null, inverted:false, sponsorable:true, hint:"Are the articles spread across at least three different outlets or websites?", text:"independent coverage appears across 3 or more different publications", evidence:"web addresses from each different publication" },
  { id:"BA05", dimension:"BA", subComponent:"SC4.1 Editorial volume + recency", subComponentPoints:20, criteriaInSubComponent:5, tag:"S", pattern:null, inverted:false, sponsorable:true, hint:"Do the same searches for two or three competitor brands at a similar stage. How does this brand's amount of coverage compare to theirs? Match to the level below.", text:"the brand has as much media coverage as comparable brands at the same stage", evidence:"notes comparing coverage against similar brands" },
  // SC4.2 Editorial quality (15pts, 3, BA09 removed, points redistributed across BA06/07/08)
  { id:"BA06", dimension:"BA", subComponent:"SC4.2 Editorial quality", subComponentPoints:15, criteriaInSubComponent:3, tag:"M", pattern:"C", inverted:false, sponsorable:false, hint:"Read three or four of the articles side by side with the brand's own press release. Do the articles add new reporting and original opinions, or do they just repeat the press release word for word? Match to the level below.", text:"coverage is genuine editorial opinion, not just copied press releases", evidence:"notes comparing the articles to the original press release" },
  { id:"BA07", dimension:"BA", subComponent:"SC4.2 Editorial quality", subComponentPoints:15, criteriaInSubComponent:3, tag:"S", pattern:null, inverted:false, sponsorable:false, hint:"In at least one article, does the writer give an actual opinion or verdict about the brand, not just announce its existence?", text:"at least one article gives a real editorial opinion, not just an announcement", evidence:"web address of the article with an editorial opinion" },
  { id:"BA08", dimension:"BA", subComponent:"SC4.2 Editorial quality", subComponentPoints:15, criteriaInSubComponent:3, tag:"M", pattern:"F", inverted:false, sponsorable:false, hint:"Are any of the articles published in the country's most widely read and respected outlets, such as major newspapers or the biggest news websites? Match to the level below.", text:"the brand has been covered by a major, well-known publication", evidence:"web addresses of the major publication articles" },
  // (BA09 intentionally deleted, sponsored/earned owned by tri-state criteria only)
