<!-- VISTA, Visibility Intelligence & Strategic Trust Assessment. Methodology and instrument authored by Adhit Satish. 2026. -->
<meta charset="utf-8">
<meta name="author" content="Adhit Satish">
<title>VISTA Calculator</title>
<style>
  /* =====================================================
     VISTA CALCULATOR - Dark Theme (Oblivion edition)
     Palette: deep-black bg / white text / orange accent
     ===================================================== */
  :root {
    --bg:   #060a0d;
    --bg-1: #0b1218;
    --bg-2: #101a22;
    --fg:   #dde4eb;
    --fg-2: #8aa0b4;
    --muted:#3d5264;
    --accent:#e28f26;
    --accent-dim:rgba(226,143,38,0.10);
    --accent-border:rgba(226,143,38,0.30);
    --line: rgba(255,255,255,0.055);
    --line-strong:rgba(255,255,255,0.11);
    --gap:  #d9603a;
    --ok:   #52c178;
    --r:    10px;
    --r-sm: 6px;
    --r-pill:20px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: var(--bg); color: var(--fg);
    font-family: 'Roboto', system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
    font-size: 15px; line-height: 1.55;
  }
  /* HEADER */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 40px; border-bottom: 1px solid var(--line);
    background: var(--bg-1);
  }
  header h1 { margin: 0; font-weight: 700; font-size: 18px; letter-spacing: 2.5px; text-transform: uppercase; }
  header .sub { color: var(--muted); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
  header .status { font-size: 11px; letter-spacing: 1px; color: var(--muted); }
  /* TABS */
  nav.tabs {
    display: flex; gap: 0; padding: 0 32px;
    border-bottom: 1px solid var(--line);
    background: var(--bg-1); position: sticky; top: 0; z-index: 10;
  }
  nav.tabs button {
    background: transparent; border: 0; border-bottom: 2px solid transparent;
    padding: 12px 16px; font-size: 10px; color: var(--muted);
    letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
    font-family: inherit; transition: color 0.15s;
  }
  nav.tabs button:hover { color: var(--fg-2); }
  nav.tabs button.active { color: var(--accent); border-bottom-color: var(--accent); }
  nav.tabs button[data-dim].active { color: var(--accent); border-bottom-color: var(--accent); }
  nav.tabs button .tab-count { display: block; font-size: 9px; letter-spacing: 0.5px; margin-top: 2px; text-transform: none; opacity: 0.6; }
  /* MAIN LAYOUT - right panel fills full column height */
  main {
    display: grid; grid-template-columns: 1fr 300px;
    min-height: calc(100vh - 50px); gap: 0;
  }
  main.summary-view { grid-template-columns: 1fr; }
  section.panel { min-width: 0; padding: 28px 36px 80px 36px; }
  aside.radar-rail {
    background: var(--bg-1); align-self: stretch;
    border-left: 1px solid var(--line);
  }
  .radar-card {
    position: sticky; top: 50px; padding: 22px;
    background: transparent; border: none;
  }
  /* TYPOGRAPHY */
  h2 { font-weight: 600; font-size: 15px; margin: 0 0 4px 0; letter-spacing: 2px; text-transform: uppercase; }
  h2 .dim-code { color: var(--accent); font-weight: 700; margin-right: 10px; }
  .dim-intro { color: var(--muted); font-size: 12px; margin-bottom: 14px; }
  /* TYPE LEGEND */
  .type-legend {
    display: flex; flex-wrap: wrap; gap: 6px 20px; font-size: 11px; color: var(--fg-2);
    margin-bottom: 22px; padding: 10px 14px;
    background: var(--bg-2); border-radius: var(--r); border: 1px solid var(--line);
  }
  .type-legend .leg-item b { color: var(--fg); }
  /* SUBCOMPONENT */
  .subcomp { border-top: 1px solid var(--line); padding: 0 0 8px 0; }
  .subcomp h3 { margin: 0; font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--fg-2); }
  .subcomp .sc-meta { color: var(--muted); font-size: 12px; margin-bottom: 14px; margin-top: 5px; }
  .subcomp-header { display: flex; align-items: center; gap: 10px; padding: 16px 0 0 0; cursor: pointer; user-select: none; }
  .subcomp-header h3 { flex: 1; }
  .subcomp-toggle { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 13px; padding: 0 2px; transition: transform 0.18s; font-family: inherit; line-height: 1; }
  .subcomp.collapsed .subcomp-toggle { transform: rotate(-90deg); }
  .subcomp.collapsed .sc-meta, .subcomp.collapsed .criterion { display: none; }
  .sc-badge { font-size: 10px; color: var(--muted); background: var(--bg-2); padding: 2px 9px; border-radius: var(--r-pill); white-space: nowrap; border: 1px solid var(--line); }
  .sc-badge.done { background: rgba(82,193,120,0.10); color: var(--ok); font-weight: 600; border-color: rgba(82,193,120,0.22); }
  /* CRITERION ROWS */
  .criterion {
    display: grid; grid-template-columns: 52px 1fr; gap: 14px;
    padding: 14px 0; border-bottom: 1px solid var(--line);
  }
  .criterion:last-child { border-bottom: 0; }
  .criterion.na { opacity: 0.32; }
  .na-badge {
    display: inline-block; margin-top: 4px; padding: 1px 9px;
    border: 1px solid var(--line-strong); border-radius: var(--r-pill);
    font-size: 10px; letter-spacing: 1px; color: var(--muted);
  }
  .crit-id { font-size: 11px; letter-spacing: 1px; color: var(--muted); padding-top: 2px; }
  .crit-id .pat { color: var(--accent); font-weight: 600; }
  .crit-text { font-size: 14px; color: var(--fg); }
  .crit-hint { font-size: 12px; color: var(--fg-2); margin-top: 5px; line-height: 1.5; }
  .crit-ev { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .crit-note-wrap { margin-top: 8px; }
  .crit-note-btn { background: none; border: 1px solid var(--line); border-radius: var(--r-pill); padding: 3px 12px; font-size: 11px; color: var(--fg-2); cursor: pointer; font-family: inherit; letter-spacing: 0.3px; }
  .crit-note-btn:hover { border-color: var(--accent-border); color: var(--accent); }
  .crit-note-area { margin-top: 8px; }
  .crit-note-ta { width: 100%; max-width: 100%; box-sizing: border-box; background: var(--bg-2); border: 1px solid var(--line); border-radius: var(--r-sm); color: var(--fg); font-family: inherit; font-size: 12px; padding: 8px; resize: vertical; min-height: 44px; }
  .crit-note-ta:focus { border-color: var(--accent-border); outline: none; }
  .crit-note-ta::placeholder { color: var(--muted); }
  .crit-input { margin-top: 10px; }
  .crit-input label { display: inline-flex; align-items: center; gap: 6px; margin-right: 18px; cursor: pointer; font-size: 13px; }
  .crit-input input { accent-color: var(--accent); }
  /* M ANCHORS */
  .m-anchors { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-top: 10px; }
  .m-anchor {
    border: 1px solid var(--line); padding: 10px; border-radius: var(--r-sm); font-size: 11px;
    cursor: pointer; background: var(--bg-2); color: var(--fg-2);
    display: flex; flex-direction: column; gap: 5px; align-items: flex-start;
    transition: border-color 0.12s, box-shadow 0.12s, background 0.12s;
  }
  .m-anchor:hover { border-color: var(--line-strong); background: var(--bg-1); }
  .m-anchor.selected {
    border-color: var(--accent); background: var(--accent-dim);
    box-shadow: 0 0 0 1px var(--accent-border), 0 0 20px rgba(226,143,38,0.07);
    color: var(--fg);
  }
  .m-anchor .lvl { font-size: 10px; letter-spacing: 1px; color: var(--muted); }
  .m-anchor.selected .lvl { color: var(--accent); }
  .m-anchor .anc-text { line-height: 1.35; }
  .inv-note { font-size: 11px; color: var(--accent); letter-spacing: 0.5px; margin-bottom: 6px; font-weight: 500; }
  /* TRI (BA sponsorable) */
  .tri { display: flex; gap: 8px; flex-wrap: wrap; }
  .tri label {
    border: 1px solid var(--line); padding: 6px 16px;
    border-radius: var(--r-pill); cursor: pointer; font-size: 12px; color: var(--muted);
    transition: border-color 0.1s, background 0.1s, color 0.1s;
  }
  .tri input[type=radio] { display: none; }
  .tri label:has(input:checked) { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }
  /* YES / NO / N/A */
  .yn-tri { display: flex; gap: 8px; flex-wrap: wrap; }
  .yn-tri label {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 5px 18px; border: 1px solid var(--line);
    border-radius: var(--r-pill); cursor: pointer; font-size: 12px; font-weight: 500;
    color: var(--muted); transition: border-color 0.1s, background 0.1s, color 0.1s;
    user-select: none;
  }
  .yn-tri input[type=radio] { display: none; }
  .yn-tri label.yn-sel-yes { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }
  .yn-tri label.yn-sel-no  { border-color: var(--gap); background: rgba(217,96,58,0.10); color: var(--gap); }
  .yn-tri label.yn-sel-na  { border-color: var(--line-strong); background: var(--bg-2); color: var(--fg-2); }
  /* CONFIRM ROW */
  .confirm-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 28px; padding-top: 20px; border-top: 1px solid var(--line);
  }
  .confirm-row .live-score { font-size: 24px; font-weight: 600; letter-spacing: -0.5px; }
  .confirm-row .live-score span { color: var(--muted); font-size: 12px; font-weight: 400; letter-spacing: 1px; margin-left: 8px; }
  button.confirm {
    background: var(--accent); color: #060a0d; border: 0;
    padding: 11px 28px; letter-spacing: 2px; text-transform: uppercase; font-size: 11px;
    cursor: pointer; font-family: inherit; border-radius: var(--r-sm); font-weight: 700;
    transition: opacity 0.15s;
  }
  button.confirm:hover { opacity: 0.82; }
  button.ghost {
    background: transparent; color: var(--fg-2);
    border: 1px solid var(--line-strong); border-radius: var(--r-sm);
    padding: 10px 18px; letter-spacing: 1.5px; text-transform: uppercase; font-size: 11px;
    cursor: pointer; font-family: inherit;
    transition: border-color 0.15s, color 0.15s;
  }
  button.ghost:hover { border-color: var(--accent); color: var(--accent); }
  /* RADAR CARD (inside aside) */
  .radar-card h4 {
    margin: 0 0 8px 0; font-size: 10px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--muted); font-weight: 500;
  }
  .composite { font-size: 40px; font-weight: 600; letter-spacing: -1px; color: var(--fg); }
  .composite .of { color: var(--muted); font-size: 18px; font-weight: 400; }
  .band {
    display: inline-block; font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase;
    color: var(--accent); margin-top: 6px; padding: 4px 14px;
    border: 1px solid var(--accent-border); border-radius: var(--r-pill);
  }
  .dim-list { list-style: none; padding: 0; margin: 18px 0 0 0; font-size: 12px; }
  .dim-list li {
    display: flex; justify-content: space-between; padding: 7px 0;
    border-bottom: 1px solid var(--line);
  }
  .dim-list li.confirmed { color: var(--fg-2); }
  .dim-list li:not(.confirmed) { color: var(--muted); }
  .dim-list li .val { font-variant-numeric: tabular-nums; color: var(--accent); font-weight: 600; }
  /* RED FLAGS */
  .flags { margin-top: 18px; }
  .flags h4 { margin: 0 0 8px 0; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); font-weight: 500; }
  .flag-chip {
    display: block; padding: 10px 14px; margin-bottom: 6px; font-size: 12px; color: var(--fg-2);
    border-left: 2px solid var(--gap); background: rgba(217,96,58,0.07);
    border-radius: 0 var(--r-sm) var(--r-sm) 0;
  }
  .flag-chip.provisional::after {
    content: 'early result, verify after 5+ assessments'; display: block; margin-top: 4px;
    font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted);
  }
  .empty-flags { font-size: 12px; color: var(--muted); font-style: italic; }
  /* FOCUS AREAS */
  .focus-box { margin-top: 18px; }
  .focus-box h4 { margin: 0 0 8px 0; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); font-weight: 500; }
  .focus-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 5px; }
  .focus-list li {
    display: flex; align-items: baseline; gap: 10px;
    padding: 8px 12px; border-left: 2px solid var(--accent);
    background: var(--accent-dim); border-radius: 0 var(--r-sm) var(--r-sm) 0; font-size: 12px;
  }
  .focus-dim { flex: 1; }
  .focus-score { font-weight: 600; font-variant-numeric: tabular-nums; color: var(--accent); }
  .focus-max { font-weight: 400; color: var(--muted); font-size: 11px; }
  .focus-note { font-size: 11px; color: var(--muted); white-space: nowrap; }
  /* META GRID (summary tab brand fields) */
  .meta-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px 20px; margin: 8px 0 24px 0; }
  .meta-grid label { display: flex; flex-direction: column; font-size: 11px; color: var(--muted); letter-spacing: 0.5px; }
  .meta-grid input, .meta-grid select {
    margin-top: 6px; padding: 10px 12px;
    border: 1px solid var(--line-strong); border-radius: var(--r-sm);
    font-family: inherit; font-size: 14px; color: var(--fg); background: var(--bg-2);
  }
  /* SECTION CARDS (sc-inputs) */
  .sc-inputs {
    border: 1px solid var(--line); border-left: 2px solid var(--accent);
    padding: 18px; margin-bottom: 22px;
    background: var(--bg-1); border-radius: 0 var(--r) var(--r) 0;
  }
  .sc-inputs h3 { margin: 0 0 4px 0; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--fg-2); }
  .sc-inputs .note { color: var(--muted); font-size: 12px; margin-bottom: 14px; }
  /* SECTOR FLAGS GRID */
  .flags-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 22px; }
  .flags-grid label { display: flex; gap: 8px; align-items: flex-start; font-size: 13px; cursor: pointer; }
  .flags-grid .flag-def { color: var(--fg-2); font-size: 12px; margin-top: 2px; }
  .flag-error { color: var(--gap); font-size: 12px; margin-top: 8px; }
  /* SC SOCIAL INPUTS */
  .platform-row {
    display: grid; grid-template-columns: 130px repeat(6, 1fr); gap: 10px; align-items: center;
    padding: 6px 0; font-size: 12px;
  }
  .platform-row.header { color: var(--muted); font-size: 10px; letter-spacing: 1px; text-transform: uppercase; }
  .platform-row input {
    padding: 6px 8px; border: 1px solid var(--line-strong); border-radius: var(--r-sm);
    font-family: inherit; font-size: 13px; background: var(--bg-2); color: var(--fg); width: 100%;
  }
  .er-readout {
    margin-top: 14px; padding: 12px 16px;
    background: var(--bg-2); border: 1px solid var(--line); border-radius: var(--r);
    display: flex; gap: 30px; font-variant-numeric: tabular-nums;
  }
  .er-readout .label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
  .er-readout .val { font-size: 18px; font-weight: 500; color: var(--accent); }
  /* SUMMARY HEADER */
  .summary-header { display: flex; justify-content: space-between; align-items: end; margin-bottom: 24px; flex-wrap: wrap; gap: 8px; }
  .summary-header .actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .import-note { font-size: 11px; color: var(--muted); margin-top: 4px; text-align: right; width: 100%; }
  /* AV PROTOCOL DEFS */
  .av-defs { margin: 8px 0 14px 0; padding: 0; display: grid; grid-template-columns: max-content 1fr; gap: 4px 14px; font-size: 12px; }
  .av-defs dt { font-weight: 600; color: var(--fg-2); white-space: nowrap; padding-top: 1px; }
  .av-defs dd { margin: 0; color: var(--muted); }
  /* BIG RADAR (summary page) */
  .big-radar { display: flex; justify-content: center; margin: 20px 0 40px 0; }
  .summary-score-card {
    background: var(--bg-1); border: 1px solid var(--line); border-radius: var(--r);
    padding: 28px; margin-bottom: 24px;
  }
  .summary-score-card .dim-list li .val { color: var(--accent); font-weight: 600; }
  /* MATURITY BANDS */
  .band-invisible  { color: var(--accent); }
  .band-emerging   { color: var(--accent); }
  .band-developing { color: var(--accent); }
  .band-established{ color: #52c178; }
  .band-leading    { color: #2ecc71; }
  /* FOOTER */
  .footer-note {
    padding: 20px 40px; color: var(--muted); font-size: 10px; letter-spacing: 1px;
    border-top: 1px solid var(--line); text-align: center; background: var(--bg-1);
    text-transform: uppercase;
  }
  #importFile { display: none; }
  /* STICKY PROGRESS BAR */
  .dim-sticky { position: sticky; top: 50px; z-index: 4; background: var(--bg); border-bottom: 1px solid var(--line); padding: 8px 0 10px 0; margin-bottom: 22px; }
  .dim-sticky-inner { display: flex; align-items: center; gap: 14px; }
  .dim-sticky-inner .dl { font-size: 10px; color: var(--muted); white-space: nowrap; text-transform: uppercase; letter-spacing: 1px; }
  .dim-sticky-inner .dbar { flex: 1; height: 3px; background: var(--bg-2); border-radius: 2px; overflow: hidden; }
  .dim-sticky-inner .dbar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s ease; box-shadow: 0 0 10px rgba(226,143,38,0.6); }
  .dim-sticky-inner .dc { font-size: 12px; font-weight: 500; white-space: nowrap; color: var(--fg-2); }
  .dim-sticky-inner .dt { font-size: 11px; color: var(--muted); padding-left: 10px; border-left: 1px solid var(--line); white-space: nowrap; }
  /* DRAFT TOAST */
  .draft-toast {
    position: fixed; bottom: 28px; right: 28px; z-index: 200;
    background: var(--bg-2); color: var(--fg);
    border: 1px solid var(--line-strong); border-radius: var(--r);
    padding: 14px 20px; display: flex; align-items: center; gap: 16px; font-size: 13px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.7); animation: toast-in 0.2s ease;
  }
  @keyframes toast-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .draft-toast .dt-save { background: var(--accent); color: #060a0d; border: none; padding: 7px 14px; cursor: pointer; font-family: inherit; font-size: 12px; letter-spacing: 0.5px; border-radius: var(--r-sm); font-weight: 700; }
  .draft-toast .dt-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 20px; line-height: 1; padding: 0 4px; font-family: inherit; }
  /* RESPONSIVE */
  @media (max-width: 900px) {
    main { grid-template-columns: 1fr; }
    aside.radar-rail { align-self: auto; border-left: none; border-top: 1px solid var(--line); }
    .meta-grid { grid-template-columns: 1fr 1fr; }
    .platform-row { grid-template-columns: 1fr; }
    .m-anchors { grid-template-columns: 1fr; }
  }
  @media (max-width: 768px) {
    nav.tabs { padding: 0 12px; overflow-x: auto; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; }
    nav.tabs button { padding: 12px 10px; font-size: 10px; white-space: nowrap; }
    section.panel { padding: 20px 16px 60px 16px; }
    header { padding: 12px 16px; }
    .summary-header { flex-direction: column; align-items: flex-start; }
    .summary-header .actions { width: 100%; }
    .flags-grid { grid-template-columns: 1fr; }
  }
  /* PRINT */
  @media print {
    header, nav.tabs, .dim-sticky, .confirm-row, .draft-toast, .actions, .import-note, .focus-box, .type-legend, .av-defs { display: none !important; }
    body { background: #fff !important; color: #111 !important; }
    aside.radar-rail { background: #fff !important; border: none !important; }
    .radar-card { background: #fff !important; border: 1px solid #ddd !important; page-break-inside: avoid; }
    .radar-card h4, .dim-list li { color: #333 !important; }
    .band { border-color: #e28f26 !important; color: #e28f26 !important; }
    .dim-list li .val { color: #e28f26 !important; }
    main { display: block !important; background: #fff !important; }
    section.panel { padding: 0 16px !important; border: none !important; }
    .subcomp { page-break-inside: avoid; }
    .crit-text { color: #111 !important; }
    .crit-hint { color: #555 !important; }
    .crit-id { color: #888 !important; }
    .yn-tri label { padding: 3px 10px; font-size: 11px; border-color: #ddd; color: #999; background: #fff; border-radius: 12px; }
    .yn-tri label.yn-sel-yes { border-color: #e28f26; color: #e28f26; background: #fff8ec; }
    .yn-tri label.yn-sel-no  { border-color: #d9603a; color: #d9603a; background: #fdf0eb; }
    .yn-tri label.yn-sel-na  { border-color: #aaa; color: #777; background: #f5f5f5; }
    .m-anchor { border-color: #ddd !important; background: #f9f9f9 !important; box-shadow: none !important; color: #333 !important; }
    .m-anchor.selected { border-color: #e28f26 !important; background: #fff8ec !important; }
    .sc-inputs { background: #f9f9f9 !important; border-color: #e28f26 !important; border-radius: 0 !important; }
    .sc-inputs h3 { color: #555 !important; }
    .focus-list li { background: #fff8ec !important; }
    .flag-chip { background: #fdf0eb !important; }
  }
</style>

<header>
  <div>
    <h1><span style="color:var(--accent)">VISTA</span> Calculator</h1>
    <div class="sub">Visibility Intelligence &amp; Strategic Trust Assessment · v1</div>
  </div>
  <div class="sub" id="assert-status">loading…</div>
</header>

<nav class="tabs" id="tabs"></nav>

/* ============================================================
   ASSERTIONS, halt on mismatch (no silent wrong answers)
   ============================================================ */
const EXPECTED_COUNTS = { SV: 49, AV: 27, DE: 38, BA: 26, SC: 28, RC: 27 };
const EXPECTED_TOTAL = 195;
const BUILD_ID = "f53fb6c922119870fc09944e822a300a5d6eacbeed067a0ec448427ed6b3e950";

function runAssertions() {
  const counts = {};
  for (const c of CRITERIA) counts[c.dimension] = (counts[c.dimension] || 0) + 1;
  const errors = [];
  for (const [dim, n] of Object.entries(EXPECTED_COUNTS)) {
    if (counts[dim] !== n) errors.push(`${dim} count mismatch: got ${counts[dim]}, expected ${n}`);
  }
  if (CRITERIA.length !== EXPECTED_TOTAL) errors.push(`total mismatch: ${CRITERIA.length} vs ${EXPECTED_TOTAL}`);

  // Per-dimension sub-component point sums must reconcile to 100
  const subSums = {};
  const seenSubComps = {};
  for (const c of CRITERIA) {
    const key = c.dimension + "||" + c.subComponent;
    if (!seenSubComps[key]) {
      seenSubComps[key] = true;
      subSums[c.dimension] = (subSums[c.dimension] || 0) + c.subComponentPoints;
    }
  }
  for (const [dim, tot] of Object.entries(subSums)) {
    if (tot !== 100) errors.push(`${dim} sub-comp point total = ${tot}, expected 100`);
  }

  // BA06/BA07/BA08 must carry criteriaInSubComponent=3 (SC4.2 post-BA09 deletion)
  for (const id of ["BA06","BA07","BA08"]) {
    const c = CRITERIA.find(x => x.id === id);
    if (!c || c.criteriaInSubComponent !== 3) {
      errors.push(`${id} criteriaInSubComponent must be 3 (SC4.2 has 3 criteria after BA09 deletion)`);
    }
  }

  // Every criterion's criteriaInSubComponent must equal the actual count in that sub-component
  const subCompCounts = {};
  for (const c of CRITERIA) {
    subCompCounts[c.subComponent] = (subCompCounts[c.subComponent] || 0) + 1;
  }
  for (const c of CRITERIA) {
    if (subCompCounts[c.subComponent] !== c.criteriaInSubComponent) {
      errors.push(`${c.id} declares ${c.criteriaInSubComponent} in "${c.subComponent}" but that sub-comp has ${subCompCounts[c.subComponent]}`);
    }
  }

  // Renormalization must reconcile: under EVERY flag combination, the
  // renormalized points of each applicable dimension sum to exactly 100.
  const flagNames = Object.keys(APPLICABILITY_FLAGS);
  for (let mask = 0; mask < (1 << flagNames.length); mask++) {
    const flags = {};
    flagNames.forEach((f, i) => flags[f] = !!(mask & (1 << i)));
    const model = buildPointsModel(flags);
    for (const d of ["SV","AV","DE","BA","SC","RC"]) {
      if (!model.dimApplicable[d]) continue;
      let tot = 0;
      for (const c of CRITERIA) if (c.dimension === d) tot += model.ptsOf[c.id];
      if (Math.abs(tot - 100) > 1e-9) {
        errors.push(`renormalization: ${d} totals ${tot.toFixed(6)} under flags mask ${mask}, expected 100`);
      }
    }
  }
  return errors;
}

/* ============================================================
   APPLICABILITY LAYER (published rules, see 01_Framework/applicability-rules.md)
   A criterion whose required flag is OFF is N/A: no input, excluded from
   scoring and counters. Points renormalize so every applicable dimension
   still totals 100 under any flag combination.
   ============================================================ */
const APPLICABILITY_FLAGS = {
  PHYSICAL_LOCATION:  "The brand has a physical location customers can visit (store, branch, office, or venue).",
  PHYSICAL_PRODUCT:   "The brand sells tangible products with specific models (e.g. consumer electronics, appliances, vehicles). Not for pure services, software, or financial products.",
  EV_PHEV:            "The brand has a sub-range or product variant with its own dedicated buyer questions and content (e.g. a premium tier, a specialist line, or a technology-specific category).",
  BOOKABLE_EXPERIENCE:"The brand offers a bookable appointment, trial, or demonstration (e.g. product demo, consultation, site visit, or test experience)."
};
const FLAG_DISPLAY = {
  PHYSICAL_LOCATION:  "Physical Location",
  PHYSICAL_PRODUCT:   "Physical Products",
  EV_PHEV:            "Specialised Product Variant",
  BOOKABLE_EXPERIENCE:"Bookable Experience"
};
const CRIT_FLAGS = {
  SV31:"PHYSICAL_LOCATION", SV32:"PHYSICAL_LOCATION", SV33:"PHYSICAL_LOCATION",
  SV34:"PHYSICAL_LOCATION", SV35:"PHYSICAL_LOCATION", SV36:"PHYSICAL_LOCATION",
  SV37:"PHYSICAL_LOCATION", SV38:"PHYSICAL_LOCATION", SV39:"PHYSICAL_LOCATION",
  DE09:"PHYSICAL_LOCATION", DE36:"PHYSICAL_LOCATION", RC01:"PHYSICAL_LOCATION", RC04:"PHYSICAL_LOCATION",
  SV05:"PHYSICAL_PRODUCT", SV24:"PHYSICAL_PRODUCT", SV43:"PHYSICAL_PRODUCT", SV50:"PHYSICAL_PRODUCT",
  DE02:"PHYSICAL_PRODUCT", DE04:"PHYSICAL_PRODUCT", DE21:"PHYSICAL_PRODUCT", DE22:"PHYSICAL_PRODUCT",
  AV13:"PHYSICAL_PRODUCT", AV14:"PHYSICAL_PRODUCT",
  AV16:"EV_PHEV", DE39:"EV_PHEV",
  DE08:"BOOKABLE_EXPERIENCE"
};

function isApplicable(c, flags) {
  const f = CRIT_FLAGS[c.id];
  return !f || !!flags[f];
}

// Renormalized point value per criterion under the active flags.
// Within a sub-component: its points split across APPLICABLE criteria only.
// A sub-component with zero applicable criteria is dead: its points
// redistribute proportionally across the live sub-components of the dimension.
function buildPointsModel(flags) {
  const subAppl = {};   // subComponent -> applicable criterion count
  const subPts = {};    // subComponent -> declared points
  const subDim = {};    // subComponent -> dimension
  for (const c of CRITERIA) {
    subPts[c.subComponent] = c.subComponentPoints;
    subDim[c.subComponent] = c.dimension;
    subAppl[c.subComponent] = (subAppl[c.subComponent] || 0) + (isApplicable(c, flags) ? 1 : 0);
  }
  const liveTotal = {};  // dimension -> sum of live sub-component points
  for (const sc of Object.keys(subPts)) {
    if (subAppl[sc] > 0) liveTotal[subDim[sc]] = (liveTotal[subDim[sc]] || 0) + subPts[sc];
  }
  const ptsOf = {};      // criterion id -> renormalized point value (0 if N/A)
  for (const c of CRITERIA) {
    if (!isApplicable(c, flags) || subAppl[c.subComponent] === 0) { ptsOf[c.id] = 0; continue; }
    const scale = 100 / liveTotal[c.dimension];  // proportional redistribution of dead sub-components
    ptsOf[c.id] = (c.subComponentPoints * scale) / subAppl[c.subComponent];
  }
  const dimApplicable = {};
  for (const d of ["SV","AV","DE","BA","SC","RC"]) {
    dimApplicable[d] = CRITERIA.some(c => c.dimension === d && isApplicable(c, flags));
  }
  return { ptsOf, dimApplicable };
}

/* ============================================================
   SCORING (pure functions)
   ============================================================ */
function critPts(c) {
  return buildPointsModel(state.flags).ptsOf[c.id];
}

function critValue(c, state, model) {
  const pts = (model || buildPointsModel(state.flags)).ptsOf[c.id];
  if (pts === 0) return 0;  // N/A or dead sub-component
  const v = state.answers[c.id];
  if (c.tag === "M") {
    if (v == null) return 0;
    const s = Number(v);
    if (!(s >= 1 && s <= 5)) return 0;
    return ((s - 1) / 4) * pts;
  }
  // Checklist criteria: any item ticked = full points, empty = 0
  if (c.checklist) {
    return Array.isArray(v) && v.length > 0 ? pts : 0;
  }
  // A/S binary, with tri-state override for BA sponsorables
  if (c.sponsorable) {
    if (v === "earned") return pts;
    if (v === "sponsored") return 0.5 * pts;
    return 0;
  }
  return (v === true || v === "yes") ? pts : 0;
}

function dimensionScore(dim, state) {
  const model = buildPointsModel(state.flags);
  if (!model.dimApplicable[dim]) return null;  // dimension entirely N/A
  let sum = 0;
  for (const c of CRITERIA) if (c.dimension === dim) sum += critValue(c, state, model);
  if (sum > 100) sum = 100;
  return sum;
}

function composite(state) {
  const dims = ["SV","AV","DE","BA","SC","RC"];
  const scores = dims.map(d => dimensionScore(d, state)).filter(s => s !== null);
  if (!scores.length) return 0;
  return scores.reduce((a,b) => a+b, 0) / scores.length;
}

function maturityBand(score) {
  if (score <= 20) return { label: "Invisible", cls: "band-invisible" };
  if (score <= 40) return { label: "Emerging", cls: "band-emerging" };
  if (score <= 60) return { label: "Developing", cls: "band-developing" };
  if (score <= 80) return { label: "Established", cls: "band-established" };
  return { label: "Leading", cls: "band-leading" };
}

/* ============================================================
   ENGAGEMENT, per-post-then-average path (locked)
   Same source of truth for the ER value and the ≥50 gate.
   ============================================================ */
function computeERAndFloor(posts, followers) {
  // posts: array of {shares, saves, comments, likes}; followers: number
  if (!posts || !posts.length || !followers || followers <= 0) {
    return { er: null, avgWeighted: null };
  }
  let sumWeighted = 0;
  let sumER = 0;
  let n = 0;
  for (const p of posts) {
    const w = (Number(p.shares)||0)*5 + (Number(p.saves)||0)*3 +
              (Number(p.comments)||0)*2 + (Number(p.likes)||0)*1;
    sumWeighted += w;
    sumER += (w / followers) * 100;
    n++;
  }
  return { er: sumER / n, avgWeighted: sumWeighted / n };
}

/* ============================================================
   RED FLAGS, read from state, render as chips
   ============================================================ */
function computeFlags(state) {
  const flags = [];

  // 1. Bought/dead audience, provisional
  const primary = state.social?.primary;
  if (primary && primary.posts && primary.posts.length && primary.followers > 0) {
    const { er, avgWeighted } = computeERAndFloor(primary.posts, primary.followers);
    if (er != null && er < 0.5 && avgWeighted >= 50) {
      flags.push({
        id: "bought-dead",
        text: "Suspicious audience: very low engagement despite active posting suggests the followers may not be real or actively engaged.",
        provisional: true
      });
    }
  }

  // 2. Invisible to AI, AV11..AV18 all unchecked/false
  const aeoIds = ["AV11","AV12","AV13","AV14","AV15","AV16","AV17","AV18"];
  const anyAeo = aeoIds.some(id => state.answers[id] === true || state.answers[id] === "yes");
  if (!anyAeo) flags.push({ id:"invisible-ai", text:"Not found by AI: the brand's website doesn't answer any of the key questions that AI search engines look for.", provisional:false });

  // 3. Structural SEO ceiling, SV40 unchecked
  if (state.answers["SV40"] === false || state.answers["SV40"] === "no") {
    flags.push({ id:"seo-ceiling", text:"Website visibility limited: the brand shares a domain with a parent company, which restricts how Google can rank it independently.", provisional:false });
  }

  // 4. Wrong-era audience, FB/IG ratio >= 10 AND launch year >= 2020
  const fb = Number(state.social?.fbFollowers) || 0;
  const ig = Number(state.social?.igFollowers) || 0;
  const launchYear = Number(state.meta?.launchYear) || 0;
  if (ig > 0 && launchYear >= 2020 && (fb / ig) >= 10) {
    flags.push({ id:"wrong-era", text:"Platform mismatch: a brand launched after 2020 has far more Facebook followers than Instagram, which is the wrong audience mix for today's buyers.", provisional:false });
  }

  // 5. Absent where buyers decide, RC14 score = 1
  if (Number(state.answers["RC14"]) === 1) {
    flags.push({ id:"absent-community", text:"Absent from buyer discussions: the brand doesn't appear in the main community where people in this category make purchasing decisions.", provisional:false });
  }

  return flags;
}

// A criterion counts as answered when it holds a real value: binary true/false
// (explicitly evaluated, not untouched), tri-state any of the three, M 1-5,
// checklist at least one item ticked (empty array scores 0, same as untouched,
// so it does NOT count). N/A criteria are excluded from both sides of the count.
function isAnswered(c) {
  const v = state.answers[c.id];
  if (c.checklist) return Array.isArray(v) && v.length > 0;
  if (c.tag === "M") { const s = Number(v); return s >= 1 && s <= 5; }
  if (c.sponsorable) return v === "absent" || v === "sponsored" || v === "earned";
  return v === true || v === false || v === "yes" || v === "no" || v === "na";
}

function progressFor(dim) {
  let answered = 0, applicable = 0;
  for (const c of CRITERIA) {
    if (dim && c.dimension !== dim) continue;
    if (!isApplicable(c, state.flags)) continue;
    applicable++;
    if (isAnswered(c)) answered++;
  }
  return { answered, applicable };
}

function renderTabs() {
  const nav = document.getElementById("tabs");
  nav.innerHTML = "";
  const tabs = [...DIM_META.map(d => ({ key: d.key, label: d.short })), { key:"SUMMARY", label:"Summary" }];
  for (const t of tabs) {
    const b = document.createElement("button");
    const p = t.key === "SUMMARY" ? progressFor(null) : progressFor(t.key);
    b.innerHTML = `${t.label}<span class="tab-count">${p.answered}/${p.applicable}</span>`;
    b.className = (state.activeTab === t.key) ? "active" : "";
    if (t.key !== "SUMMARY") b.setAttribute("data-dim", t.key);
    b.onclick = () => {
      state.activeTab = t.key;
      window.scrollTo({ top: 0, behavior: "smooth" });
      renderAll();
    };
    nav.appendChild(b);
  }
}

function anchorFor(c, lvl) {
  // Criterion-specific anchors take priority - required for all -inv criteria.
  if (c.inlineAnchors && c.inlineAnchors[lvl]) return c.inlineAnchors[lvl];
  // Formal -inv rule: reverse the base pattern's level order.
  // 5 always = good/desirable, 1 always = deficient (zero-anchored).
  const p = PATTERNS[c.pattern];
  if (!p) return "";
  if (c.inverted) return p.levels[6 - lvl];
  return p.levels[lvl];
}

function progressForSubComp(scName) {
  let answered = 0, applicable = 0;
  for (const c of CRITERIA) {
    if (c.subComponent !== scName) continue;
    if (!isApplicable(c, state.flags)) continue;
    applicable++;
    if (isAnswered(c)) answered++;
  }
  return { answered, applicable };
}

function scrollToNextUnanswered() {
  if (state.activeTab === "SUMMARY") return;
  const dim = state.activeTab;
  const next = CRITERIA.find(c => c.dimension === dim && isApplicable(c, state.flags) && !isAnswered(c));
  if (!next) return;
  const el = document.querySelector(`[data-crit-id="${next.id}"]`);
  if (!el) return;
  const rect = el.getBoundingClientRect();
  // Forward-only: only scroll if the next unanswered is below the current view
  if (rect.top > window.innerHeight * 0.65) {
    el.scrollIntoView({ behavior: "smooth", block: "center" });
  }
}

function showDraftToast(answered) {
  const existing = document.getElementById("draft-toast");
  if (existing) existing.remove();
  const div = document.createElement("div");
  div.id = "draft-toast";
  div.className = "draft-toast";
  div.innerHTML = `<span>You've answered <strong>${answered}</strong> questions. Save a draft so you don't lose your work.</span>
    <button class="dt-save">Save draft</button>
    <button class="dt-close" title="Dismiss">&#x2715;</button>`;
  div.querySelector(".dt-save").onclick = () => { exportJSON(); div.remove(); };
  div.querySelector(".dt-close").onclick = () => div.remove();
  document.body.appendChild(div);
  setTimeout(() => { const el = document.getElementById("draft-toast"); if (el) el.remove(); }, 12000);
}

function checkDraftPrompt() {
  const { answered } = progressFor(null);
  const milestone = Math.floor(answered / 25) * 25;
  if (milestone >= 25 && milestone > lastDraftMilestone) {
    lastDraftMilestone = milestone;
    showDraftToast(answered);
  }
}

  if (dim === "SC") wrap.appendChild(renderSCInputs());

  // Group by sub-component
  const bySubComp = {};

    if (c.dimension !== dim) continue;
    (bySubComp[c.subComponent] = bySubComp[c.subComponent] || []).push(c);
  }
  const model = buildPointsModel(state.flags);
  for (const [sc, arr] of Object.entries(bySubComp)) {

    const h3 = document.createElement("h3"); h3.textContent = sc;
    const badge = document.createElement("span");
    badge.className = "sc-badge" + (scApp > 0 && scAns === scApp ? " done" : "");
    badge.textContent = scApp > 0 ? `${scAns}/${scApp}` : "N/A";
    hdr.appendChild(toggle); hdr.appendChild(h3); hdr.appendChild(badge);

    sec.appendChild(hdr);

    const meta2 = document.createElement("div"); meta2.className = "sc-meta";
    const applicable = arr.filter(c => isApplicable(c, state.flags));
    if (applicable.length === 0) {
      meta2.textContent = `${arr[0].subComponentPoints} pts · entire section not applicable under current settings · points redistributed within ${dim}`;
    } else {
      const per = model.ptsOf[applicable[0].id];
      const naNote = applicable.length < arr.length ? `, ${arr.length - applicable.length} not applicable` : "";
      meta2.textContent = `${arr[0].subComponentPoints} pts · ${applicable.length} questions${naNote} · ${per.toFixed(2)} pts each`;
    }
    sec.appendChild(meta2);
    for (const c of arr) sec.appendChild(renderCriterion(c));
    wrap.appendChild(sec);
  }

  // Confirm row with live dimension score
  const row = document.createElement("div");
  row.className = "confirm-row";
  const live = document.createElement("div");
  live.className = "live-score";
  const s = dimensionScore(dim, state);
  live.innerHTML = s === null ? `n/a<span>not applicable</span>` : `${s.toFixed(1)}<span>/ 100</span>`;
  row.appendChild(live);
  const btn = document.createElement("button");
  btn.className = "confirm";
  btn.textContent = state.confirmed[dim] ? "Confirm again" : "Confirm section";
  btn.onclick = () => {
    state.confirmed[dim] = true;
    animateRadarAxis(dim, s === null ? 0 : s);
    renderAll();
  };
  row.appendChild(btn);
  wrap.appendChild(row);
  return wrap;
}

function renderCriterion(c) {
  const el = document.createElement("div");

function answer(id, val) {
  state.answers[id] = val;
  pendingNextScroll = true;
  renderAll();
}

function renderInput(c) {
  const box = document.createElement("div"); box.className = "crit-input";
  if (c.checklist) {
    const wrap = document.createElement("div");
    wrap.className = "tri";
    wrap.style.flexWrap = "wrap";
    const cur = Array.isArray(state.answers[c.id]) ? state.answers[c.id] : [];
    for (const item of c.checklist) {
      const lab = document.createElement("label");
      const inp = document.createElement("input");
      inp.type = "checkbox";
      inp.checked = cur.includes(item);
      inp.onchange = () => {
        const now = Array.isArray(state.answers[c.id]) ? [...state.answers[c.id]] : [];
        if (inp.checked) { if (!now.includes(item)) now.push(item); }
        else { const i = now.indexOf(item); if (i >= 0) now.splice(i, 1); }
        answer(c.id, now);
      };
      lab.appendChild(inp);
      lab.appendChild(document.createTextNode(" " + item));
      wrap.appendChild(lab);
    }
    box.appendChild(wrap);
    return box;
  }
  if (c.tag === "M") {
    if (c.inverted) {
      const invNote = document.createElement("div"); invNote.className = "inv-note";
      invNote.textContent = "5 = good · 1 = deficient";
      box.appendChild(invNote);
    }
    const grid = document.createElement("div"); grid.className = "m-anchors";
    for (let lvl = 1; lvl <= 5; lvl++) {
      const a = document.createElement("div");
      a.className = "m-anchor" + (String(state.answers[c.id]) === String(lvl) ? " selected" : "");
      a.innerHTML = `<div class="lvl">${lvl} · ${lvl===1?"0%":lvl===5?"100%":((lvl-1)/4*100)+"%"}</div><div class="anc-text">${anchorFor(c, lvl)}</div>`;
      a.onclick = () => answer(c.id, String(lvl));
      grid.appendChild(a);
    }
    box.appendChild(grid);
  } else if (c.sponsorable) {
    const tri = document.createElement("div"); tri.className = "tri";
    for (const v of ["absent","sponsored","earned"]) {
      const lab = document.createElement("label");
      const inp = document.createElement("input");
      inp.type = "radio"; inp.name = "tri_" + c.id;
      inp.checked = (state.answers[c.id] || "absent") === v;
      inp.onchange = () => answer(c.id, v);
      lab.appendChild(inp);
      lab.appendChild(document.createTextNode(" " + v));
      tri.appendChild(lab);
    }
    box.appendChild(tri);
  } else {
    const tri = document.createElement("div"); tri.className = "yn-tri";
    const cur = state.answers[c.id];
    const curStr = cur === true ? "yes" : cur === false ? "no" : (typeof cur === "string" ? cur : "");
    for (const [v, label] of [["yes","Yes"],["no","No"],["na","N / A"]]) {
      const lab = document.createElement("label");
      if (curStr === v) lab.className = "yn-sel-" + v;
      const inp = document.createElement("input");
      inp.type = "radio"; inp.name = "yn_" + c.id; inp.value = v;
      inp.checked = curStr === v;
      inp.onchange = () => {
        answer(c.id, v);
        tri.querySelectorAll("label").forEach(l => l.className = "");
        lab.className = "yn-sel-" + v;
      };
      lab.appendChild(inp);
      lab.appendChild(document.createTextNode(" " + label));
      tri.appendChild(lab);
    }
    box.appendChild(tri);
  }
  return box;
}

    </label>
    <label style="display:flex;flex-direction:column;font-size:12px;color:var(--muted);">Facebook followers
      <input id="sc_fb" type="number" min="0" value="${state.social.fbFollowers}" style="${_iStyle}width:130px;">
    </label>
    ${_isOther ? `<label style="display:flex;flex-direction:column;font-size:12px;color:var(--muted);">${_plat} followers
      <input id="sc_primary_followers" type="number" min="0" value="${state.social.primary.followers}" style="${_iStyle}width:130px;">
    </label>` : ""}
  `;
  platWrap.appendChild(platRow);

  // Primary followers for ER: IG if primary=Instagram, FB if primary=Facebook, otherwise state.social.primary.followers
  const _primaryFollowers = _plat === "Instagram" ? (state.social.igFollowers || 0)
    : _plat === "Facebook" ? (state.social.fbFollowers || 0)
    : (state.social.primary.followers || 0);

  const header = document.createElement("div");
  header.className = "platform-row header";
  header.innerHTML = "<div>Post #</div><div>shares</div><div>saves</div><div>comments</div><div>likes</div><div>weighted</div><div>ER %</div>";
  platWrap.appendChild(header);
  for (let i = 0; i < 10; i++) {
    const r = document.createElement("div"); r.className = "platform-row";
    const w = (Number(state.social.primary.posts[i].shares)||0)*5 + (Number(state.social.primary.posts[i].saves)||0)*3 +
              (Number(state.social.primary.posts[i].comments)||0)*2 + (Number(state.social.primary.posts[i].likes)||0)*1;
    const er = _primaryFollowers > 0 ? (w / _primaryFollowers * 100).toFixed(3) : "–";
    r.innerHTML = `
      <div>post ${i+1}</div>
      <div><input type="number" min="0" data-post="${i}" data-field="shares" value="${state.social.primary.posts[i].shares}"></div>
      <div><input type="number" min="0" data-post="${i}" data-field="saves" value="${state.social.primary.posts[i].saves}"></div>
      <div><input type="number" min="0" data-post="${i}" data-field="comments" value="${state.social.primary.posts[i].comments}"></div>
      <div><input type="number" min="0" data-post="${i}" data-field="likes" value="${state.social.primary.posts[i].likes}"></div>
      <div style="color:var(--muted);">${w}</div>
      <div style="color:var(--muted);">${er}</div>
    `;
    platWrap.appendChild(r);
  }
  box.appendChild(platWrap);

  const readout = document.createElement("div");
  readout.className = "er-readout";
  const { er, avgWeighted } = computeERAndFloor(state.social.primary.posts, _primaryFollowers);
  readout.innerHTML = `
    <div><div class="label">weighted ER</div><div class="val">${er==null?"–":er.toFixed(2)+"%"}</div></div>
    <div><div class="label">avg weighted / post</div><div class="val">${avgWeighted==null?"–":avgWeighted.toFixed(1)}</div></div>
    <div><div class="label">FB : IG ratio</div><div class="val">${state.social.igFollowers>0?(state.social.fbFollowers/state.social.igFollowers).toFixed(2):"–"}</div></div>
  `;
  box.appendChild(readout);

  // Wire inputs
  setTimeout(() => {
    const p = document.getElementById("sc_platform");
    if (p) p.onchange = e => { state.social.primary.platform = e.target.value; renderAll(); };
    const ig = document.getElementById("sc_ig");
    if (ig) ig.oninput = e => { state.social.igFollowers = Number(e.target.value)||0; renderAll(); };
    const fb = document.getElementById("sc_fb");
    if (fb) fb.oninput = e => { state.social.fbFollowers = Number(e.target.value)||0; renderAll(); };
    const pf = document.getElementById("sc_primary_followers");
    if (pf) pf.oninput = e => { state.social.primary.followers = Number(e.target.value)||0; renderAll(); };
    for (const inp of box.querySelectorAll("input[data-post]")) {
      inp.oninput = e => {
        const i = Number(e.target.dataset.post);
        const f = e.target.dataset.field;
        state.social.primary.posts[i][f] = Number(e.target.value)||0;
        renderAll();
      };
    }
  }, 0);

  return box;
}

/* ============================================================
   RADAR (hand-drawn SVG, 6 axes, animation on confirm)
   ============================================================ */
const RADAR_DIMS = ["SV","AV","DE","BA","SC","RC"];

function renderRadar(size, dark) {
  const s = size || 240;
  const cx = s/2, cy = s/2;
  const r = s * 0.42;
  const gridLevels = [20, 40, 60, 80, 100];
  const angleFor = i => (Math.PI * 2 * i / RADAR_DIMS.length) - Math.PI/2;
  const pad = 30;
  // Color scheme based on dark/light context
  const gridOuter = dark ? "#2e2e2e" : "#d8d8d8";
  const gridInner = dark ? "#222" : "#ececec";
  const axisColor = dark ? "#2a2a2a" : "#d0d0d0";
  const labelColor = dark ? "#888" : "#1e1e1e";
  const naColor = dark ? "#444" : "#9a9a9a";
  const ringLabelColor = dark ? "#444" : "#b8b8b8";
  const dotHalo = dark ? "#161616" : "#ffffff";
  let svg = `<svg width="${s + pad*2}" height="${s + pad*2}" viewBox="${-pad} ${-pad} ${s + pad*2} ${s + pad*2}" xmlns="http://www.w3.org/2000/svg">`;
  // Concentric gridlines
  for (const g of gridLevels) {
    const pts = RADAR_DIMS.map((_, i) => {
      const rad = r * (g / 100);
      const a = angleFor(i);
      return (cx + Math.cos(a)*rad).toFixed(1) + "," + (cy + Math.sin(a)*rad).toFixed(1);
    }).join(" ");
    const isOuter = g === 100;
    svg += `<polygon points="${pts}" fill="${isOuter ? (dark?"#1e1e1e":"#f5f5f5") : "none"}" stroke="${isOuter ? gridOuter : gridInner}" stroke-width="${isOuter ? "1" : "0.8"}"/>`;
    // Ring percentage label on the bottom-right axis (between axis 0 and 1)
    if (g < 100) {
      const labelA = angleFor(0) + (Math.PI * 2 / RADAR_DIMS.length) * 0.5;
      const lrad = r * (g / 100);
      const lx = cx + Math.cos(labelA) * lrad, ly = cy + Math.sin(labelA) * lrad;
      svg += `<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" text-anchor="middle" dominant-baseline="middle" font-size="7" fill="${ringLabelColor}">${g}</text>`;
    }
  }
  // Axes
  for (let i = 0; i < RADAR_DIMS.length; i++) {
    const a = angleFor(i);
    const x2 = cx + Math.cos(a)*r, y2 = cy + Math.sin(a)*r;
    svg += `<line x1="${cx}" y1="${cy}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="${axisColor}" stroke-width="0.8"/>`;
    const applicable = buildPointsModel(state.flags).dimApplicable[RADAR_DIMS[i]];
    const lx = cx + Math.cos(a)*(r+18), ly = cy + Math.sin(a)*(r+18);
    const label = applicable ? RADAR_DIMS[i] : RADAR_DIMS[i] + " n/a";
    const fill = applicable ? labelColor : naColor;
    svg += `<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="${fill}" font-weight="600" letter-spacing="1">${label}</text>`;
  }
  // Data polygon
  const pts = RADAR_DIMS.map((d, i) => {
    const v = state.radarVals[d];
    const rad = r * (v / 100);
    const a = angleFor(i);
    return (cx + Math.cos(a)*rad).toFixed(1) + "," + (cy + Math.sin(a)*rad).toFixed(1);
  }).join(" ");
  svg += `<polygon points="${pts}" fill="#e28f26" fill-opacity="0.22" stroke="#e28f26" stroke-width="2.5"/>`;
  // Data dots with halo
  for (let i = 0; i < RADAR_DIMS.length; i++) {
    const v = state.radarVals[RADAR_DIMS[i]];
    if (v === 0) continue;
    const rad = r * (v / 100);
    const a = angleFor(i);
    const px = cx + Math.cos(a)*rad, py = cy + Math.sin(a)*rad;
    svg += `<circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="5" fill="${dotHalo}"/>`;
    svg += `<circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="3.5" fill="#e28f26"/>`;
  }
  svg += "</svg>";
  return svg;
}

function animateRadarAxis(dim, target) {
  const start = state.radarVals[dim];
  const t0 = performance.now();
  const dur = 260;
  function step(now) {
    const p = Math.min(1, (now - t0) / dur);
    const eased = 1 - Math.pow(1 - p, 3);
    state.radarVals[dim] = start + (target - start) * eased;
    // Only re-render the radar rail (cheap), not the whole panel
    const rail = document.getElementById("rail");
    if (rail) rail.innerHTML = radarRailHTML();
    if (p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

/* ============================================================
   RADAR RAIL (sticky sidebar summary)
   ============================================================ */
function scoreRingSVG(value, size, dark) {
  const arcR = size * 0.39;
  const circ = 2 * Math.PI * arcR;
  const pct = Math.min(Math.max(value, 0), 100) / 100;
  const dash = circ * pct;
  const gap = circ - dash;
  const offset = circ * 0.25;
  const fg = dark ? "#ffffff" : "#1e1e1e";
  const sub = dark ? "#555" : "#9a9a9a";
  const track = dark ? "#2a2a2a" : "#ececec";
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">
    <circle cx="${size/2}" cy="${size/2}" r="${arcR}" fill="none" stroke="${track}" stroke-width="${size*0.065}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${arcR}" fill="none" stroke="#e28f26" stroke-width="${size*0.065}"
      stroke-dasharray="${dash.toFixed(2)} ${gap.toFixed(2)}"
      stroke-dashoffset="${offset.toFixed(2)}" stroke-linecap="round"/>
    <text x="${size/2}" y="${size/2 - size*0.06}" text-anchor="middle" dominant-baseline="middle"
      font-size="${size*0.2}" font-weight="600" fill="${fg}" font-family="Roboto,system-ui,sans-serif">${value.toFixed(1)}</text>
    <text x="${size/2}" y="${size/2 + size*0.12}" text-anchor="middle" dominant-baseline="middle"
      font-size="${size*0.09}" fill="${sub}" letter-spacing="1" font-family="Roboto,system-ui,sans-serif">/ 100</text>
  </svg>`;
}

function radarRailHTML() {
  const dims = RADAR_DIMS.map(d => {
    const s = dimensionScore(d, state);
    const conf = state.confirmed[d];
    return { d, s, conf };
  });
  const comp = composite(state);
  const band = maturityBand(comp);
  return `
    <div class="radar-card">
      <h4>Composite VISTA score</h4>
      <div style="display:flex;justify-content:center;margin:8px 0 4px 0;">${scoreRingSVG(comp, 120, true)}</div>
      <div style="text-align:center;">${`<span class="band ${band.cls}">${band.label}</span>`}</div>
      <div style="margin-top:16px;display:flex;justify-content:center;">${renderRadar(220, true)}</div>
      <ul class="dim-list">
        ${dims.map(x => { const m = DIM_META.find(d=>d.key===x.d); return `<li class="${x.conf?"confirmed":""}"><span>${x.d} · ${m?m.short:x.d}</span><span class="val">${x.s===null?"n/a":(x.conf?x.s.toFixed(1):"–")}</span></li>`; }).join("")}
      </ul>
    </div>
  `;
}

/* ============================================================
   SUMMARY tab
   ============================================================ */
function renderSummary() {
  const wrap = document.createElement("div");
  const head = document.createElement("div"); head.className = "summary-header";
  const h = document.createElement("h2");
  h.innerHTML = `<span class="dim-code">Σ</span>Summary & export`;
  head.appendChild(h);
  const actions = document.createElement("div"); actions.className = "actions";
  const eBtn = document.createElement("button"); eBtn.className = "ghost"; eBtn.textContent = "Export JSON";
  eBtn.onclick = exportJSON;
  const iBtn = document.createElement("button"); iBtn.className = "ghost"; iBtn.textContent = "Import JSON";
  iBtn.onclick = () => document.getElementById("importFile").click();
  const pBtn = document.createElement("button"); pBtn.className = "ghost"; pBtn.textContent = "Print / PDF";
  pBtn.onclick = () => window.print();
  actions.appendChild(eBtn); actions.appendChild(iBtn); actions.appendChild(pBtn);
  const importNote = document.createElement("div"); importNote.className = "import-note";
  importNote.textContent = "Import a .json file previously exported from this tool to resume or merge an earlier session.";
  actions.appendChild(importNote);
  head.appendChild(actions);
  wrap.appendChild(head);

  // Metadata block
  const metaBox = document.createElement("div");
  metaBox.className = "sc-inputs";
  metaBox.innerHTML = `<h3>About this brand</h3>
    <div class="note">Fill this in before you start. It saves with your results and helps identify the report.</div>`;
  const grid = document.createElement("div"); grid.className = "meta-grid";
  const fields = [
    { key:"brand", label:"brand name" },
    { key:"country", label:"country" },
    { key:"sector", label:"sector" },
    { key:"launchYear", label:"brand launch year", type:"number" },
    { key:"assessmentDate", label:"assessment date", type:"date" }
  ];
  for (const f of fields) {
    const l = document.createElement("label");
    l.textContent = f.label;
    const inp = document.createElement("input");
    inp.type = f.type || "text";
    inp.value = state.meta[f.key] || "";
    inp.oninput = e => { state.meta[f.key] = e.target.value; renderAll(); };
    l.appendChild(inp);
    grid.appendChild(l);
  }
  metaBox.appendChild(grid);
  wrap.appendChild(metaBox);

  // Sector applicability flags (published rules, applicability-rules.md).
  // Set once per assessment. Turning a flag off marks its criteria N/A and
  // renormalizes points. Blocked if fewer than 4 dimensions would remain applicable.
  const sectorFlagBox = document.createElement("div");
  sectorFlagBox.className = "sc-inputs";
  sectorFlagBox.innerHTML = `<h3>Which of these apply to this brand?</h3>
    <div class="note">Tick only what is true for this brand. Questions that don't apply will be skipped automatically and won't count against the score.</div>`;
  const fGrid = document.createElement("div");
  fGrid.className = "flags-grid";
  const errSlot = document.createElement("div");
  for (const [flag, def] of Object.entries(APPLICABILITY_FLAGS)) {
    const lab = document.createElement("label");
    const inp = document.createElement("input");
    inp.type = "checkbox";
    inp.checked = !!state.flags[flag];
    inp.onchange = () => {
      const proposed = { ...state.flags, [flag]: inp.checked };
      const applDims = Object.values(buildPointsModel(proposed).dimApplicable).filter(Boolean).length;
      if (applDims < 4) {
        inp.checked = !inp.checked;  // revert
        errSlot.innerHTML = `<div class="flag-error">Cannot disable: this combination would leave only ${applDims} sections active. At least 4 sections must apply.</div>`;
        return;
      }
      errSlot.innerHTML = "";
      state.flags = proposed;
      state.flagsTouched = true;
      renderAll();
    };
    lab.appendChild(inp);
    const span = document.createElement("span");
    span.innerHTML = `<strong>${FLAG_DISPLAY[flag]}</strong><br><span class="flag-def">${def}</span>`;
    lab.appendChild(span);
    fGrid.appendChild(lab);
  }
  sectorFlagBox.appendChild(fGrid);
  sectorFlagBox.appendChild(errSlot);
  wrap.appendChild(sectorFlagBox);

  // Big radar + composite
  const comp = composite(state);
  const band = maturityBand(comp);
  const bigCard = document.createElement("div");
  bigCard.className = "summary-score-card";
  bigCard.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:center;">
      <div>
        <h4>Composite VISTA score</h4>
        <div style="margin:12px 0 4px 0;">${scoreRingSVG(comp, 180, true)}</div>
        <div style="margin-top:4px;"><span class="band ${band.cls}" style="font-size:12px;letter-spacing:3px;padding:5px 14px;">${band.label}</span></div>
        <ul class="dim-list" style="margin-top:24px;">
          ${RADAR_DIMS.map(d => {
            const s = dimensionScore(d, state);
            const val = s === null ? "n/a" : `${s.toFixed(1)}${state.confirmed[d]?"":" *"}`;
            const short = DIM_META.find(x=>x.key===d)?.short || d;
            return `<li class="${state.confirmed[d]?"confirmed":""}"><span>${d} · ${short}</span><span class="val">${val}</span></li>`;
          }).join("")}
        </ul>
        <div style="font-size:11px;color:var(--muted);margin-top:8px;">* Score not yet confirmed. Go to that tab and click "Confirm section" to lock it in before exporting.</div>
      </div>
      <div style="display:flex;justify-content:center;">${renderRadar(360, true)}</div>
    </div>
  `;
  wrap.appendChild(bigCard);

  // Red flags
  const flags = computeFlags(state);
  const flagBox = document.createElement("div"); flagBox.className = "flags";
  flagBox.innerHTML = `<h4>Warning signals <span style="font-weight:400;letter-spacing:0;text-transform:none;font-size:11px;color:var(--muted);">· shown separately, not deducted from the score</span></h4>`;
  if (!flags.length) {
    const e = document.createElement("div"); e.className = "empty-flags";
    e.textContent = "All clear. No warning signals detected.";
    flagBox.appendChild(e);
  } else {
    for (const f of flags) {
      const c = document.createElement("div");
      c.className = "flag-chip" + (f.provisional ? " provisional" : "");
      c.textContent = f.text;
      flagBox.appendChild(c);
    }
  }
  wrap.appendChild(flagBox);

  // Focus areas: bottom-scoring confirmed dimensions
  const scored = RADAR_DIMS
    .map(d => ({ d, s: dimensionScore(d, state), confirmed: state.confirmed[d] }))
    .filter(x => x.s !== null)
    .sort((a, b) => a.s - b.s);
  if (scored.length > 0) {
    const focusBox = document.createElement("div"); focusBox.className = "focus-box";
    focusBox.innerHTML = `<h4>Where to focus next <span style="font-weight:400;letter-spacing:0;text-transform:none;font-size:11px;color:var(--muted);">· lowest-scoring dimensions</span></h4>`;
    const list = document.createElement("ul"); list.className = "focus-list";
    const top3 = scored.slice(0, Math.min(3, scored.length));
    for (const { d, s, confirmed } of top3) {
      const meta = DIM_META.find(x => x.key === d);
      const prog = progressFor(d);
      const li = document.createElement("li");
      const gap = prog.applicable - prog.answered;
      li.innerHTML = `<span class="focus-dim">${d} · ${meta?.short || d}</span>
        <span class="focus-score">${s.toFixed(1)}<span class="focus-max"> / 100</span></span>
        <span class="focus-note">${gap > 0 ? `${gap} unanswered` : confirmed ? "complete" : "not confirmed"}</span>`;
      list.appendChild(li);
    }
    focusBox.appendChild(list);
    wrap.appendChild(focusBox);
  }

  // Sector percentile, phase 2 stub
  const pctBox = document.createElement("div"); pctBox.style.marginTop = "24px";
  pctBox.innerHTML = `<h4 style="margin:0 0 6px 0;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-weight:500;">How this brand compares</h4>
    <div style="font-size:12px;color:var(--muted);font-style:italic;">Available once 5 or more brands in this sector have been assessed.</div>`;
  wrap.appendChild(pctBox);

  const authorLine = document.createElement("div");
  authorLine.style.cssText = "margin-top:32px;font-size:11px;color:var(--muted);letter-spacing:0.5px;";
  authorLine.textContent = "Methodology authored by Adhit Satish.";
  wrap.appendChild(authorLine);

  return wrap;
}

/* ============================================================
   EXPORT / IMPORT
   ============================================================ */
function exportJSON() {
  const dims = {};
  for (const d of RADAR_DIMS) dims[d] = { score: dimensionScore(d, state), confirmed: state.confirmed[d] };
  const payload = {
    schema: "vista-v1.1",
    buildId: BUILD_ID,
    exportedAt: new Date().toISOString(),
    meta: state.meta,
    applicabilityFlags: state.flags,
    engineVersions: state.engineVersions,
    social: state.social,
    answers: state.answers,
    notes: state.notes,
    dimensions: dims,
    composite: composite(state),
    maturityBand: maturityBand(composite(state)).label,
    flags: computeFlags(state)
  };
  const brand = (state.meta.brand || "brand").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
  const date = state.meta.assessmentDate || new Date().toISOString().slice(0,10);
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `${brand}-${date}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function wireImport() {
  const inp = document.getElementById("importFile");
  inp.onchange = e => {
    const f = e.target.files[0];
    if (!f) return;
    const rd = new FileReader();
    rd.onload = () => {
      try {
        const p = JSON.parse(rd.result);
        // Shallow-merge, current state wins. A criterion already answered in
        // this session is never overwritten by an import; the discarded
        // import value is logged so the researcher can see what did not land.
        if (p.answers) {
          for (const [cid, val] of Object.entries(p.answers)) {
            const crit = CRITERIA.find(c => c.id === cid);
            if (!crit) { console.warn(`import skipped for ${cid}, unknown criterion`); continue; }
            if (isAnswered(crit)) {
              console.info(`import skipped for ${cid}, existing state value = ${JSON.stringify(state.answers[cid])}`);
              continue;
            }
            state.answers[cid] = val;
          }
        }
        // Metadata and SC inputs: existing populated values win, imports fill blanks only.
        if (p.meta) {
          for (const [k, v] of Object.entries(p.meta)) {
            if (state.meta[k] === "" || state.meta[k] == null) state.meta[k] = v;
            else if (v !== state.meta[k]) console.info(`import skipped for meta.${k}, existing value kept`);
          }
        }
        if (p.social) {
          const cur = state.social;
          const scEmpty = cur.primary.followers === 0 && cur.igFollowers === 0 && cur.fbFollowers === 0 &&
            cur.primary.posts.every(x => !x.shares && !x.saves && !x.comments && !x.likes);
          if (scEmpty) state.social = { ...cur, ...p.social };
          else console.info("import skipped for SC inputs, existing values kept");
        }
        if (p.applicabilityFlags) {
          if (!state.flagsTouched) state.flags = { ...state.flags, ...p.applicabilityFlags };
          else console.info("import skipped for applicability flags, existing values kept");
        }
        if (p.engineVersions) {
          for (const [k, v] of Object.entries(p.engineVersions)) {
            if (!state.engineVersions[k]) state.engineVersions[k] = v;
          }
        }
        // Notes: import fills blanks only, existing notes are not overwritten
        if (p.notes) {
          for (const [cid, note] of Object.entries(p.notes)) {
            if (!state.notes[cid]) state.notes[cid] = note;
          }
        }
        if (p.dimensions) {
          for (const d of RADAR_DIMS) {
            state.confirmed[d] = state.confirmed[d] || !!p.dimensions[d]?.confirmed;
            const s = dimensionScore(d, state);
            state.radarVals[d] = state.confirmed[d] && s !== null ? s : 0;
          }
        }
        renderAll();
      } catch (err) {
        alert("Import failed: " + err.message);
      }
    };
    rd.readAsText(f);
    inp.value = ""; // allow re-import of the same filename
  };
}

/* ============================================================
   RENDER ORCHESTRATOR
   ============================================================ */
function renderAll() {
  renderTabs();
  const panel = document.getElementById("panel");
  const rail = document.getElementById("rail");
  const main = document.getElementById("main");
  panel.innerHTML = "";
  if (state.activeTab === "SUMMARY") {
    main.classList.add("summary-view");
    rail.style.display = "none";
    panel.appendChild(renderSummary());
  } else {
    main.classList.remove("summary-view");
    rail.style.display = "";
    panel.appendChild(renderDimTab(state.activeTab));
    rail.innerHTML = radarRailHTML();
  }
  if (pendingNextScroll) {
    pendingNextScroll = false;
    setTimeout(scrollToNextUnanswered, 60);
  }
  checkDraftPrompt();
}

/* ============================================================
   BOOT
   ============================================================ */
(function boot() {
  const errs = runAssertions();
  const statusEl = document.getElementById("assert-status");
  if (errs.length) {
    statusEl.textContent = "ASSERTION FAILURE, refusing to render";
    statusEl.style.color = "#b04e00";
    console.error("VISTA assertion failure:", errs);
    document.getElementById("main").innerHTML =
      `<section class="panel"><h2>Refusing to render</h2>
       <p>The inlined criteria failed count / point-reconciliation checks:</p>
       <ul>${errs.map(e => `<li>${e}</li>`).join("")}</ul>
       <p>Fix the data before continuing.</p></section>`;
    return;
  }
  statusEl.textContent = "195 criteria · 49/27/38/26/28/27 ✓";
  console.info("VISTA v1.1. Methodology and instrument authored by Adhit Satish.");
  wireImport();
  window.addEventListener("beforeunload", e => {
    if (progressFor(null).answered > 0) {
      e.preventDefault();
      return e.returnValue = "You have unsaved answers. Export your progress as JSON before closing.";
    }
  });
  renderAll();
})();
